model: claude-sonnet-4-6

max_headlines_per_source: 10
output_dir: summaries

sources:
  pharma_industry:
    name: "Pharma-Industrie"
    sites:
      - name: Fierce Pharma
        url: https://www.fiercepharma.com/rss/xml
        type: rss

      - name: Pharmazeutische Zeitung
        url: https://www.pharmazeutische-zeitung.de/rss/news.rss
        type: rss

      - name: Apotheke Adhoc
        url: https://www.apotheke-adhoc.de/rss/rss.xml
        type: rss

  clinical_research:
    name: "Klinische Forschung"
    sites:
      - name: NEJM
        url: https://www.nejm.org/action/showFeed?jc=nejm&type=etoc&feed=rss
        type: rss

      - name: The Lancet
        url: https://www.thelancet.com/rssfeed/lancet_online.xml
        type: rss

      - name: ClinicalTrials.gov
        url: https://clinicaltrials.gov/news-and-events
        type: html
        selector: "h2 a, h3 a, .article-title a, .news-title a"

  regulatory:
    name: "Regulatorisches"
    sites:
      - name: EMA Pressemitteilungen
        url: https://www.ema.europa.eu/en/news/press-releases/rss
        type: rss

      - name: FDA News
        url: https://www.fda.gov/about-fda/contact-fda/stay-informed/rss-feeds/press-releases/rss.xml
        type: rss

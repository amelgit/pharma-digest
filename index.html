<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedTech Digest</title>
<style>
  :root {
    /* sidebar — always dark */
    --sidebar-bg: #0f172a;
    --sidebar-text: #cbd5e1;
    --sidebar-active: #f1f5f9;
    --sidebar-hover: #1e293b;
    --sidebar-accent: #0ea5e9;
    --today-badge: #0ea5e9;
    --sidebar-w: 260px;
    /* main area — dark mode defaults */
    --main-bg: #0f172a;
    --card-bg: #1e293b;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --heading: #f1f5f9;
    --border: #334155;
    --hr: #334155;
    --link: #38bdf8;
    --code-bg: #0a1628;
    /* component tokens */
    --para-text: #cbd5e1;
    --card-shadow: 0 1px 3px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.25);
    --scrollbar-thumb: #334155;
    --mkt-bg: #162032;
    --mkt-row-border: #243348;
    --mkt-track-bg: #334155;
    --mkt-analysis-bg: #0c1f35;
    --mkt-analysis-border: #1e4d6b;
    --mkt-analysis-text: #93c5fd;
    --src-item-border: #1e293b;
  }
  body.light-mode {
    --main-bg: #f8fafc;
    --card-bg: #ffffff;
    --text: #0f172a;
    --text-muted: #64748b;
    --heading: #0f172a;
    --border: #e2e8f0;
    --hr: #e2e8f0;
    --link: #0284c7;
    --code-bg: #f1f5f9;
    --para-text: #334155;
    --card-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
    --scrollbar-thumb: #d1d5db;
    --mkt-bg: #f8fafc;
    --mkt-row-border: #f1f5f9;
    --mkt-track-bg: #e2e8f0;
    --mkt-analysis-bg: #f0f9ff;
    --mkt-analysis-border: #bae6fd;
    --mkt-analysis-text: #0c2d48;
    --src-item-border: #f8fafc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--main-bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
    transition: background-color 0.25s ease, color 0.25s ease;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  #sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid #1e293b;
  }
  #sidebar-header h1 {
    font-size: 15px;
    font-weight: 700;
    color: #f1f5f9;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  #sidebar-header p {
    font-size: 12px;
    color: var(--sidebar-text);
    margin-top: 4px;
  }
  .sidebar-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #theme-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 15px;
    padding: 2px;
    line-height: 1;
    opacity: 0.6;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  #theme-btn:hover { opacity: 1; }
  #refresh-btn {
    margin-top: 12px;
    width: 100%;
    padding: 7px 12px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 6px;
    color: #94a3b8;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  #refresh-btn:hover { background: #263244; color: #e2e8f0; border-color: #475569; }
  #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #refresh-btn.success { color: #4ade80; border-color: #166534; }
  #refresh-btn.error   { color: #f87171; border-color: #7f1d1d; }
  #prog-wrap { margin-top: 10px; display: none; }
  .prog-track {
    height: 2px;
    background: #1e293b;
    border-radius: 2px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    width: 0%;
    background: var(--sidebar-accent);
    border-radius: 2px;
    transition: width 1.2s ease;
  }
  .prog-fill.done { background: #4ade80; }
  .prog-fill.fail { background: #f87171; }
  .prog-status {
    margin-top: 7px;
    font-size: 11px;
    color: #94a3b8;
    line-height: 1.4;
  }
  #nav {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
  }
  #nav::-webkit-scrollbar { width: 4px; }
  #nav::-webkit-scrollbar-track { background: transparent; }
  #nav::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .nav-item:hover { background: var(--sidebar-hover); }
  .nav-item.active {
    background: #0c2d48;
    border-left-color: var(--sidebar-accent);
  }
  .nav-date { flex: 1; }
  .nav-weekday {
    font-size: 11px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .nav-datestr {
    font-size: 13px;
    color: var(--sidebar-active);
    font-weight: 500;
    margin-top: 1px;
  }
  .nav-item.active .nav-datestr { color: #7dd3fc; }
  .today-badge {
    font-size: 10px;
    font-weight: 600;
    background: var(--today-badge);
    color: white;
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.03em;
  }

  /* ── Main content ── */
  #main {
    flex: 1;
    overflow-y: auto;
    padding: 40px;
  }
  #main::-webkit-scrollbar { width: 6px; }
  #main::-webkit-scrollbar-track { background: var(--main-bg); }
  #main::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
  .briefing { display: none; }
  .briefing.visible { display: block; }
  .briefing-card {
    max-width: 780px;
    margin: 0 auto;
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: var(--card-shadow);
    padding: 40px 48px;
  }
  .briefing-card h1 {
    font-size: 26px;
    font-weight: 800;
    color: var(--heading);
    line-height: 1.25;
    margin-bottom: 6px;
  }
  .briefing-card h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--heading);
    margin: 32px 0 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--border);
  }
  .briefing-card h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--heading);
    margin: 20px 0 8px;
  }
  .briefing-card p {
    font-size: 15px;
    line-height: 1.75;
    color: var(--para-text);
    margin-bottom: 12px;
  }
  .briefing-card ul {
    list-style: none;
    padding: 0;
    margin-bottom: 8px;
  }
  .briefing-card ul li {
    font-size: 15px;
    line-height: 1.7;
    color: var(--para-text);
    padding: 5px 0 5px 20px;
    position: relative;
  }
  .briefing-card ul li::before {
    content: "→";
    position: absolute;
    left: 0;
    color: var(--sidebar-accent);
    font-size: 13px;
    top: 7px;
  }
  .briefing-card hr {
    border: none;
    border-top: 1px solid var(--hr);
    margin: 24px 0;
  }
  .briefing-card strong { color: var(--heading); }
  .briefing-card em { color: var(--text-muted); }
  .briefing-card code {
    background: var(--code-bg);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 13px;
  }
  .briefing-card a {
    color: var(--link);
    text-decoration: none;
  }
  .briefing-card a:hover { text-decoration: underline; }

  /* ── Market Widget ── */
  .mkt-widget {
    background: var(--mkt-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 28px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .mkt-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .mkt-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--heading);
  }
  .mkt-date-label {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .mkt-table {
    width: 100%;
    min-width: 540px;
    border-collapse: collapse;
  }
  .mkt-table th {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 0 6px 6px;
    border-bottom: 1px solid var(--border);
    text-align: right;
    white-space: nowrap;
  }
  .mkt-table th:first-child { text-align: left; }
  .mkt-table th:nth-child(3) { text-align: left; }
  .mkt-table td {
    padding: 5px 6px;
    border-bottom: 1px solid var(--mkt-row-border);
    vertical-align: middle;
    font-size: 12px;
  }
  .mkt-table tr:last-child td { border-bottom: none; }
  .mkt-name { font-weight: 600; color: var(--heading); white-space: nowrap; }
  .mkt-close {
    text-align: right;
    font-family: "SF Mono", "Fira Code", monospace;
    color: var(--text);
    white-space: nowrap;
  }
  .mkt-range { min-width: 120px; padding-top: 7px !important; padding-bottom: 7px !important; }
  .mkt-range-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--text-muted);
    font-family: "SF Mono", "Fira Code", monospace;
    margin-bottom: 3px;
  }
  .mkt-track {
    height: 3px;
    background: var(--mkt-track-bg);
    border-radius: 2px;
    position: relative;
  }
  .mkt-dot {
    position: absolute;
    width: 8px;
    height: 8px;
    background: var(--sidebar-accent);
    border-radius: 50%;
    top: -2.5px;
    transform: translateX(-50%);
    box-shadow: 0 0 0 2px var(--mkt-bg);
  }
  .mkt-pct {
    text-align: right;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .mkt-pos { color: #16a34a; }
  .mkt-neg { color: #dc2626; }
  .mkt-neutral { color: var(--text-muted); }
  .mkt-day { border-left: 2px solid var(--border); }
  .mkt-link { color: inherit; text-decoration: none; border-bottom: 1px dotted #94a3b8; }
  .mkt-link:hover { color: var(--link); border-bottom-color: var(--link); }
  .mkt-status { font-size: 9px; margin-right: 5px; }
  .mkt-status-open   { color: #22c55e; }
  .mkt-status-pre    { color: #f59e0b; }
  .mkt-status-post   { color: #f59e0b; }
  .mkt-status-closed { color: #cbd5e1; }
  .mkt-pre {
    display: block;
    font-size: 10px;
    font-family: "SF Mono", "Fira Code", monospace;
    margin-top: 2px;
  }
  .mkt-pre-label { color: var(--text-muted); }
  .mkt-pre-pos { color: #16a34a; }
  .mkt-pre-neg { color: #dc2626; }
  .mkt-analysis {
    margin-top: 14px;
    padding: 12px 16px;
    background: var(--mkt-analysis-bg);
    border: 1px solid var(--mkt-analysis-border);
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.65;
    color: var(--mkt-analysis-text);
  }
  .mkt-analysis-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #0ea5e9;
    margin-bottom: 6px;
  }
  .mkt-analysis p { margin: 0 0 6px; font-size: 13px; color: var(--mkt-analysis-text); line-height: 1.65; }
  .mkt-analysis p:last-child { margin-bottom: 0; }

  /* ── Sources ── */
  .src-details {
    margin-top: 32px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .src-summary {
    cursor: pointer;
    padding: 11px 16px;
    background: var(--mkt-bg);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    list-style: none;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .src-summary::-webkit-details-marker { display: none; }
  .src-arrow { font-size: 9px; transition: transform 0.15s; display: inline-block; }
  details[open] .src-arrow { transform: rotate(90deg); }
  .src-body { padding: 16px 20px; }
  .src-category { margin-bottom: 20px; }
  .src-category:last-child { margin-bottom: 0; }
  .src-category-name {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--sidebar-accent);
    margin-bottom: 10px;
  }
  .src-source { margin-bottom: 14px; }
  .src-source:last-child { margin-bottom: 0; }
  .src-source-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 5px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .src-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
    padding: 4px 0;
    border-bottom: 1px solid var(--src-item-border);
  }
  .src-item:last-child { border-bottom: none; }
  .src-link {
    font-size: 13px;
    color: var(--text);
    text-decoration: none;
    flex: 1;
    line-height: 1.4;
  }
  .src-link:hover { color: var(--link); text-decoration: underline; }
  .src-no-link { font-size: 13px; color: var(--text); flex: 1; line-height: 1.4; }
  .src-date {
    font-size: 10px;
    color: var(--text-muted);
    white-space: nowrap;
    font-family: "SF Mono", "Fira Code", monospace;
    flex-shrink: 0;
  }

  /* ── Section color accents (by category keyword) ── */
  .briefing-card h2.s-mdr      { border-bottom-color: #0ea5e9; }
  .briefing-card h2.s-vigil    { border-bottom-color: #ef4444; }
  .briefing-card h2.s-industry { border-bottom-color: #22c55e; }
  .briefing-card h2.s-clinical { border-bottom-color: #a855f7; }
  .briefing-card h2.s-outlook  { border-bottom-color: #f59e0b; }
  body.light-mode .briefing-card h2.s-mdr      { border-bottom-color: #0284c7; }
  body.light-mode .briefing-card h2.s-vigil    { border-bottom-color: #dc2626; }
  body.light-mode .briefing-card h2.s-industry { border-bottom-color: #16a34a; }
  body.light-mode .briefing-card h2.s-clinical { border-bottom-color: #9333ea; }
  body.light-mode .briefing-card h2.s-outlook  { border-bottom-color: #d97706; }

  /* ── Intro callout ── */
  .briefing-card p.intro-p {
    border-left: 3px solid var(--sidebar-accent);
    padding: 12px 16px !important;
    background: rgba(14,165,233,.07);
    border-radius: 0 6px 6px 0;
    margin-bottom: 28px !important;
    line-height: 1.7;
  }
  body.light-mode .briefing-card p.intro-p { background: rgba(2,132,199,.06); }

  /* ── Outlook box ── */
  .outlook-box {
    margin-top: 10px;
    padding: 14px 18px;
    background: rgba(245,158,11,.07);
    border: 1px solid rgba(245,158,11,.22);
    border-radius: 8px;
  }
  body.light-mode .outlook-box {
    background: rgba(245,158,11,.05);
    border-color: rgba(217,119,6,.22);
  }
  .outlook-box p { margin-bottom: 0 !important; }
  .outlook-box ul { margin-bottom: 0 !important; }

  /* ── Reading meta bar ── */
  .briefing-reading-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0 0 28px;
    flex-wrap: wrap;
  }
  .meta-pill {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: var(--code-bg);
    border: 1px solid var(--border);
    color: var(--sidebar-accent);
    padding: 3px 9px;
    border-radius: 10px;
  }
  .meta-readtime {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    body { flex-direction: column; overflow: auto; height: auto; }
    #sidebar { width: 100%; min-width: unset; height: auto; }
    #nav { display: flex; overflow-x: auto; padding: 8px; gap: 6px; }
    .nav-item { min-width: 130px; border-left: none; border-bottom: 3px solid transparent; border-radius: 8px; }
    .nav-item.active { border-bottom-color: var(--sidebar-accent); }
    #main { padding: 20px 16px; }
    .briefing-card { padding: 24px 20px; }
    .mkt-widget { padding: 14px 14px; }
    /* hide 52W range, 1M, YTD on small screens — keep name, price, Δ1T, 1T%, 1W */
    .mkt-table th:nth-child(5), .mkt-table td:nth-child(5),
    .mkt-table th:nth-child(7), .mkt-table td:nth-child(7),
    .mkt-table th:nth-child(8), .mkt-table td:nth-child(8) { display: none; }
  }
</style>
</head>
<body>

<nav id="sidebar">
  <div id="sidebar-header">
    <div class="sidebar-title-row">
      <h1>MedTech Digest</h1>
      <button id="theme-btn" onclick="toggleTheme()" title="Dark/Light Mode umschalten">🌙</button>
    </div>
    <p id="count-label"></p>
    <button id="refresh-btn" onclick="triggerRebuild()">
      <span id="refresh-icon">🔄</span>
      <span id="refresh-label">Neu generieren</span>
    </button>
    <div id="prog-wrap">
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
      <div class="prog-status" id="prog-status"></div>
    </div>
  </div>
  <div id="nav"></div>
</nav>

<main id="main">
  <div id="content"></div>
</main>

<script>
function enhanceCard(card) {
  // Color-code h2 section headers by keyword
  card.querySelectorAll('h2').forEach(h2 => {
    const t = h2.textContent.toLowerCase();
    if (/ausblick|fazit/.test(t))                                  h2.classList.add('s-outlook');
    else if (/mdr|ivdr|regulat|zulassung|bfarm|ema|fda/.test(t))   h2.classList.add('s-mdr');
    else if (/vigilanz|sicherheit|recall|rückruf|fsca/.test(t))    h2.classList.add('s-vigil');
    else if (/industrie|markt|medtech|unternehmen/.test(t))        h2.classList.add('s-industry');
    else if (/klinisch|studie|evidenz|bewertung|cer/.test(t))      h2.classList.add('s-clinical');
  });

  // Style first paragraph as intro callout
  const h1 = card.querySelector('h1');
  if (h1) {
    const intro = h1.nextElementSibling;
    if (intro && intro.tagName === 'P') intro.classList.add('intro-p');
  }

  // Wrap Ausblick content in a styled box
  card.querySelectorAll('h2.s-outlook').forEach(h2 => {
    const box = document.createElement('div');
    box.className = 'outlook-box';
    const nodes = [];
    let node = h2.nextElementSibling;
    while (node && node.tagName !== 'H2') {
      nodes.push(node);
      node = node.nextElementSibling;
    }
    if (nodes.length) {
      h2.after(box);
      nodes.forEach(n => box.appendChild(n));
    }
  });

  // Add reading meta bar (after intro-p detection, before it)
  if (h1) {
    const words = (card.textContent || '').trim().split(/\s+/).length;
    const mins = Math.max(1, Math.round(words / 220));
    const meta = document.createElement('div');
    meta.className = 'briefing-reading-meta';
    meta.innerHTML = '<span class="meta-pill">MDR-Fokus</span>'
      + `<span class="meta-readtime">~${mins} Min. Lesezeit</span>`;
    h1.after(meta);
  }
}

function applyTheme(mode) {
  if (mode === "light") {
    document.body.classList.add("light-mode");
    document.getElementById("theme-btn").textContent = "☀️";
  } else {
    document.body.classList.remove("light-mode");
    document.getElementById("theme-btn").textContent = "🌙";
  }
}
function toggleTheme() {
  const isLight = document.body.classList.contains("light-mode");
  const next = isLight ? "dark" : "light";
  try { localStorage.setItem("pharma_theme", next); } catch(e) {}
  applyTheme(next);
}
applyTheme((() => { try { return localStorage.getItem("pharma_theme") || "dark"; } catch(e) { return "dark"; } })());

const briefings = [
  {
    "id": "2026-05-14",
    "date": "2026-05-14",

-range\"><div class=\"mkt-range-labels\"><span>$47.55</span><span>$64.36</span></div><div class=\"mkt-track\"><div class=\"mkt-dot\" style=\"left:5.7%\"></div></div></td><td class=\"mkt-pct mkt-neg \">-2.41%</td><td class=\"mkt-pct mkt-neg \">-10.75%</td><td class=\"mkt-pct mkt-neg \">-21.56%</td></tr></tbody></table><div class=\"mkt-analysis\"><div class=\"mkt-analysis-title\">🔍 Kursbewegungen &amp; MedTech-News</div><p>Die überwiegend negativen Kursbewegungen bei Coloplast (-1,92 %), Boston Scientific (-1,92 %) und BD/C.R. Bard (-2,26 %) sind im Kontext des gestrigen Briefings plausibel, da die FDA-Governance-Krise – insbesondere das Blockieren von Impfstoff-Sicherheitsstudien und die Kritik an Alnylams Werbekommunikation – ein allgemeines regulatorisches Misstrauensklima schafft, das MedTech-Werte mit starker US-Zulassungsabhängigkeit belastet. Die deutliche Underperformance von BD/C.R. Bard ist dabei besonders auffällig, da das Unternehmen als diversifizierter Gerätehersteller besonders sensitiv auf FDA-Signale zur Compliance und Marktüberwachung reagiert. Kontraintuitiv erscheint hingegen der Kursanstieg von Siemens Healthineers (+1,53 %), der sich möglicherweise durch die positiven ATLAS-Metaanalysedaten zur Thrombektomie erklären lässt, da Siemens Healthineers als führender Anbieter bildgebender und interventioneller Systeme direkt von einer Ausweitung des therapeutischen Fensters bei Schlaganfallbehandlungen profitieren könnte. Teleflex (+0,78 %) folgt dieser Logik teilweise, da das Unternehmen ebenfalls Produkte im vaskulären Interventionsbereich anbietet und von der wachsenden klinischen Evidenz für endovaskuläre Eingriffe begünstigt wird. Die moderate Schwäche des iShares MedTech ETF (-0,39 %) spiegelt das gemischte Bild korrekt wider und deutet darauf hin, dass sektorspezifische Nachrichten einzelne Titel stärker differenzieren als den Gesamtsektor.</p></div></div>\n\n<h1>📋 Regulatory Affairs Briefing – Medizinprodukte & Urologie</h1>\n<p><strong>Farco Pharma GmbH | 14. Mai 2026</strong></p>\n\n<hr>\n\n<h2>Einleitung</h2>\n\n<p>Der heutige Tag ist regulatorisch geprägt durch industrielle Konsolidierungsbewegungen im MedTech-Sektor sowie durch mehrere FDA-relevante Entwicklungen – darunter ein bedeutender Führungswechsel an der FDA-Spitze, der mittelfristig Auswirkungen auf das regulatorische Klima in den USA haben könnte. Aus urologischer Perspektive liefert die aktuelle AUA-Literatur klinisch relevante Erkenntnisse zu Neuromodulation, Blasenkrebsversorgung und pädiatrischer Urologie, die PMCF-Strategien und klinische Bewertungen für entsprechende Produktgruppen informieren können.</p>\n\n<hr>\n\n<h2>1. MDR & Regulatorik</h2>\n\n<p>> <em>Keine tagesaktuellen Schlagzeilen verfügbar. Nachfolgend regulatorisch relevante Kontextinformationen aus den übrigen Kategorien:</em></p>\n\n<ul>\n  <li><strong>FDA-Führungsvakuum:</strong> Der Rücktritt von FDA-Chef Marty Makary schafft regulatorische Unsicherheit im US-Markt. Für Unternehmen mit parallelen EU/US-Zulassungsstrategien (z. B. 510(k), PMA parallel zu MDR-Konformitätsbewertung) empfiehlt sich erhöhte Aufmerksamkeit bezüglich möglicher Politikänderungen bei Clearance-Prozessen und Guidance-Dokumenten.</li>\n  <li><strong>AI-gestützte Medizinprodukte im Vormarsch:</strong> Zwei FDA-Entscheidungen (Artera AI, Bayesian Health) unterstreichen den regulatorischen Trend zu SaMD (Software as a Medical Device). Im EU-Kontext bleibt MDCG 2019-16 (SaMD-Klassifizierung) sowie die Schnittstelle zur KI-Verordnung (EU AI Act, ab August 2026 vollständig anwendbar) ein kritischer Überwachungsbereich.</li>\n  <li><strong>Kombination MDR/AI Act:</strong> Mit dem vollständigen Inkrafttreten des EU AI Act ab August 2026 rückt die Klassifizierung von KI-gestützten Medizinprodukten als „High-Risk AI Systems\" (Annex III AI Act) in den Fokus – mit direkter Relevanz für MDR-konforme technische Dokumentation (Anhang II/III MDR).</li>\n  <li><strong>EUDAMED-Vollbetrieb:</strong> Registrierungspflichten und UDI-Datenqualität bleiben ein laufendes Compliance-Thema; keine neuen Fristen kommuniziert, aber operative Bereitschaft sollte kontinuierlich überprüft werden.</li>\n</ul>\n\n<hr>\n\n<h2>2. Vigilanz & Sicherheit</h2>\n\n<p>> <em>Keine tagesaktuellen Vigilanzmeldungen verfügbar. Regulatorisch relevante Hinweise aus der MedTech-Industrie:</em></p>\n\n<ul>\n  <li><strong>⚠️ Rückruf: Medline-Spritzen-Problem betrifft 4 Hersteller</strong> – Vier Medizinproduktehersteller haben Kits wegen eines Defekts an Medline-Spritzen zurückgerufen. Dies ist ein klassischer Fall einer <strong>Komponenten-bedingten FSCA</strong>: Wenn ein Zulieferteil (hier: Spritzen als Bestandteil von Kits) ein Sicherheitsproblem verursacht, sind alle betroffenen Fertigprodukte potenziell meldepflichtig. Gemäß MDR Art. 87 ff. und MDCG 2023-3 (Guidance on FSCA) sind Hersteller verpflichtet, FSCAs auch für Kombinationsprodukte und Kits eigenverantwortlich zu bewerten und zu melden. <strong>Handlungsempfehlung:</strong> Lieferantenbasis auf Medline-Spritzen-Verwendung prüfen.</li>\n  <li><strong>Risikoklassen-Relevanz:</strong> Spritzen und Injektionssysteme fallen typischerweise unter Klasse IIa (MDR Regel 6/7), Kombinationskits ggf. unter höhere Klassen je nach Zweckbestimmung. Traceability über UDI-Kette ist Voraussetzung für schnelle FSCA-Durchführung.</li>\n  <li><strong>PMS-Pflicht:</strong> Dieser Vorfall illustriert die Notwendigkeit robuster Post-Market Surveillance-Systeme (MDR Art. 83–86), die auch Zulieferkomponenten überwachen. Signaldetektionsprozesse sollten Lieferanten-Vigilanzdaten systematisch einbeziehen.</li>\n  <li><strong>Keine urologischen FSCAs gemeldet (heute):</strong> Im Bereich urologische Katheter, Drainagen oder Inkontinenzprodukte liegen für diesen Tag keine bekannten Rückrufe oder FSCAs vor – Überwachung der BfArM-Datenbank und EUDAMED-Vigilanzmodul bleibt Standard.</li>\n</ul>\n\n<hr>\n\n<h2>3. MedTech-Industrie & Wettbewerb</h2>\n\n<ul>\n  <li><strong>[Wettbewerb] J&J lanciert verbesserten Shockwave-Katheter:</strong> Johnson & Johnson bringt eine Weiterentwicklung seines Shockwave-Katheters auf den Markt. Im Kontext der Harnsteinbehandlung (<strong>[Urologie]</strong>) sind Shockwave-/Lithotripter-Katheter für Farcos Produktportfolio-Umfeldbeobachtung relevant. Regulatorisch handelt es sich vermutlich um eine Klasse III-Änderung (MDR Regel 6, aktive Therapieprodukte) oder eine 510(k)-Variante im US-Markt – klinische Daten für den europäischen CER-Prozess (MDR Anhang XIV) müssen äquivalente Produkte berücksichtigen.</li>\n  <li><strong>HistoSonics sucht FDA De Novo für Nierenkrebs-Behandlung</strong> <strong>[Urologie]:</strong> Das Unternehmen HistoSonics beantragt FDA De Novo Authorization für ein histotriptisches Verfahren zur Behandlung von Nierentumoren. De Novo ist der US-Weg für neuartige Produkte ohne Präzedens – EU-seitig wäre dies ein Klasse III-Verfahren mit benannter Stelle und klinischer Prüfung nach MDR Art. 62 ff. Relevanz für Farco: Beobachtung neuer minimalinvasiver Verfahren in der Uroonkologie.</li>\n  <li><strong>[Wettbewerb] BD ernennt neuen CFO (Vitor Roque):</strong> <strong>[Wettbewerb]</strong> BD (Becton Dickinson, Mutterkonzern von C.R. Bard) setzt mit der permanenten CFO-Besetzung nach Restrukturierungsphase ein Stabilitätssignal. BD/C.R. Bard ist direkter Wettbewerber im urologischen Kathetermarkt; strategische Investitions- und Portfolioentscheidungen von BD sollten weiterhin beobachtet werden.</li>\n  <li><strong>Stryker akquiriert Amplitude Vascular für bis zu 835 Mio. USD:</strong> Weitere Konsolidierung im MedTech-Sektor. Stryker stärkt mit diesem vaskulären Deal sein Interventionsspektrum. Für Farco mittelbar relevant als Indikator für den anhaltenden M&A-Druck im Medizinproduktesektor, der Marktstrukturen und Lieferketten beeinflussen kann.</li>\n  <li><strong>Medtronic schließt California-Standort:</strong> Restrukturierungssignal von einem der weltgrößten MedTech-Unternehmen. Im Rahmen von Lieferketten-Risikobewertung (MDR Anhang I, GSPR 3 – Anforderungen an Design und Fertigung) sollten Änderungen bei großen Zulieferern im Blick behalten werden.</li>\n</ul>\n\n<hr>\n\n<h2>4. Urologie & Klinische Evidenz</h2>\n\n<ul>\n  <li><strong>[Urologie] TITAN 2 Pivotal Study – Implantierbare tibiale Neuromodulation:</strong> Positive Ergebnisse für implantierbare tibiale Neuromodulation bei Urge-Inkontinenz. Für aktive implantierbare Medizinprodukte (AIMD) dieser Art gilt MDR Klasse III (Regel 8). Klinische Daten aus Pivotal Studies wie TITAN 2 sind hochrelevant als klinische Evidenz für CER-Zwecke (MDR Anhang XIV, Teil A) und PMCF-Planung ähnlicher oder konkurrierender Systeme. <strong>[Urologie]</strong> Inkontinenzbehandlung ist Kernbereich für Farco.</li>\n  <li><strong>[Urologie] EMBRACE RCT – ERAS bei ambulanter TURBT:</strong> Der randomisiert-kontrollierte EMBRACE-Trial untersucht Enhanced Recovery After Surgery (ERAS)-Protokolle bei transurethraler BlasentumorResektion (TURBT). Relevanz für Endoskopie-/Uroskopiezubehör (Spülmedien, Katheter, Scheiden): Klinische Daten aus RCTs dieser Art können in CERs und PMCF-Reports für begleitende Medizinprodukte einbezogen werden (MDCG 2020-13).</li>\n  <li><strong>[Urologie] Intravesikale Botulinumtoxin-Injektion bei Kindern (Neurogenic Bladder):</strong> Die Studie belegt Machbarkeit und Tolerabilität von ambulanten Botox-Injektionen in der pädiatrischen Neurourologie. Für Kombinationsprodukte (Drug-Device Combinations nach MDR Art. 1(8)/(9)) – z. B. Injektionskits oder spezialisierte Zystoskope für diese Anwendung – sind pädiatrische klinische Daten regulatorisch besonders relevant (MDR Art. 62(4), Sondervorgaben für vulnerable Populationen). <strong>[Urologie]</strong></li>\n  <li><strong>[Urologie] Testosterone & Prostatakarzinom – Neues Framework:</strong> Die Publikation stellt das Androgen-Adequacy/Inadequacy-Konzept vor und revidiert traditionelle Annahmen zur Testosteron-Prostatakarzinom-Verbindung. Relevant für Farco im Kontext urologisch-pharmakologischer Produkte (BPH, Hormontherapie-Begleitung) sowie als klinischer Hintergrund für IFU-Konformität und bestimmungsgemäße Verwendung.</li>\n  <li><strong>[Urologie] Ureterdilatation als UTI-Risikofaktor bei Kindern:</strong> Klinische Studie zum Harnstau bei pränataler Hydronephrose fordert Überarbeitung bestehender Leitlinien. Für Katheter- und Drainageprodukte (<strong>[Urologie]</strong>) mit pädiatrischer Indikation sollte die klinische Evidenzlage in der technischen Dokumentation (MDR Anhang II, Abschnitt 6.1 – Nutzen-Risiko-Abwägung) aktualisiert werden, sobald überarbeitete Guidelines vorliegen.</li>\n</ul>\n\n<hr>\n\n<h2>⏭️ Ausblick für Regulatory Affairs bei Farco</h2>\n\n<p>Mit dem voll</p><details class=\"src-details\"><summary class=\"src-summary\"><span class=\"src-arrow\">▶</span>📰 Quellen &amp; Schlagzeilen (20 Artikel)</summary><div class=\"src-body\"><div class=\"src-category\"><div class=\"src-category-name\">MedTech-Industrie</div><div class=\"src-source\"><div class=\"src-source-name\">MedTech Dive</div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/4-medtech-manufacturers-recall-kits-over-problem-with-medline-syringes/820181/\" target=\"_blank\" class=\"src-link\">4 medtech manufacturers recall kits over problem with Medline syringes</a><span class=\"src-date\">13.05.2026, 20:29</span></div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/jj-launches-improved-shockwave-catheter/820121/\" target=\"_blank\" class=\"src-link\">J&amp;J launches improved Shockwave catheter</a><span class=\"src-date\">13.05.2026, 15:08</span></div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/artera-gets-fda-clearance-for-ai-breast-cancer-risk-prediction-tool/819665/\" target=\"_blank\" class=\"src-link\">Artera gets FDA clearance for AI breast cancer risk prediction tool</a><span class=\"src-date\">12.05.2026, 19:44</span></div><div class=\"src-item     "html": "<h1>Pharma-Briefing – 08. Mai 2026</h1>\n\n<hr>\n\n<h2>Einleitung</h2>\n\n<p>Der heutige Tag steht im Zeichen wegweisender klinischer Daten aus der Schlaganfall- und Onkologieforschung sowie strategischer Bewegungen im Pharmamarkt – allen voran der milliardenschwere US-Expansion von Angelini und das starke Debüt von Novo Nordisks oraler Semaglutid-Formulierung. Auf regulatorischer Seite sorgt die FDA mit mehreren ungewöhnlichen Entscheidungen für Gesprächsstoff, die das Vertrauen in Zulassungsprozesse und Kommunikationsstandards berühren.</p>\n\n<hr>\n\n<h2>🏭 Pharma-Industrie</h2>\n\n<ul>\n  <li><strong>Angelini übernimmt Catalyst Biosciences für 4,1 Mrd. USD:</strong> Das italienische Pharmaunternehmen setzt damit ein klares Signal für seine US-Wachsamkeitsstrategie. Die Transaktion unterstreicht den anhaltenden Konsolidierungsdruck im Markt – insbesondere für mittelgroße Unternehmen, die in der Neurologie und Psychiatrie aktiv sind, zwei Kernbereiche von Angelini.</li>\n</ul>\n\n<ul>\n  <li><strong>Novo Nordisks oraler Wegovy (Semaglutid-Tablette) erzielt 355 Mio. USD im Erstquartal:</strong> CEO Lars Fruergaard Jørgensen spricht von einem Preis-„Sweet Spot\", der Accessibilität und Margenerwartungen balanciert. Für Industrieapotheker relevant: Die orale Bioverfügbarkeit von GLP-1-Agonisten gilt nach wie vor als formulierungstechnische Herausforderung – der kommerzielle Erfolg bestätigt, dass diese überwunden ist.</li>\n</ul>\n\n<ul>\n  <li><strong>FDA überdenkt die Ablehnung der Zelltherapie Ebvallo (Tabelecleucel):</strong> Die überraschende Ablehnung der EBV-spezifischen T-Zell-Therapie war ein Rückschlag für den Hersteller Pierre Fabre. Die FDA-Bereitschaft zur Neuprüfung ist ein positives Signal für die Zelltherapie-Pipeline insgesamt – und könnte präzedenzwirksam für uniQure und andere sein.</li>\n</ul>\n\n<ul>\n  <li><strong>FDA rügt Alnylam wegen Wirksamkeitsbehauptungen auf der Amvuttra-Website:</strong> Die FDA kritisierte irreführende Effektivitätsangaben für den RNAi-Wirkstoff Vutrisiran (ATTR-Amyloidose). Für Regulatory-Affairs-Teams ein Warnsignal: Auch digitale Kommunikationskanäle unterliegen strenger Werbeaufsicht – Compliance-Überprüfungen von Online-Inhalten sind essenziell.</li>\n</ul>\n\n<ul>\n  <li><strong>FDA blockiert Veröffentlichung von Sicherheitsstudien zu COVID- und Gürtelrose-Impfstoffen (NYT):</strong> Laut <em>New York Times</em> verhindert die FDA die Publikation behördlich beauftragter Sicherheitsanalysen. Dies ist im Kontext der aktuellen politischen Einflussnahme auf US-Gesundheitsbehörden besorgniserregend und könnte das internationale Vertrauen in regulatorische Transparenz beschädigen – ein Thema, das auch für EMA und AGES relevant ist.</li>\n</ul>\n\n<hr>\n\n<h2>🔬 Klinische Forschung</h2>\n\n<ul>\n  <li><strong>TAPIS-Studie (Lancet): Duale Thrombozytenhemmung plus Thrombolyse beim ischämischen Schlaganfall:</strong> Die randomisierte, doppelblinde chinesische Multicenterstudie zeigt positive Ergebnisse für Ticagrelor plus Aspirin in Kombination mit intravenöser Thrombolyse bei einem definierten Schlaganfallphänotyp. Die begleitenden Kommentare betonen die Relevanz der Patientenselektion – ein wichtiges Signal für zukünftige Leitlinienentwicklungen in der Schlaganfalltherapie.</li>\n</ul>\n\n<ul>\n  <li><strong>ATLAS-Metaanalyse (Lancet): Thrombektomie bis 24 h nach Schlaganfall auch bei großem Infarkt-Core wirksam:</strong> Die individuelle Patientendaten-Metaanalyse bestätigt den Nutzen der endovaskulären Thrombektomie auch bei ausgedehnten Infarkten (niedrige ASPECTS-Scores) bis zu 24 Stunden nach Symptombeginn. Dies erweitert das therapeutische Fenster erheblich und hat direkte Implikationen für die Schlaganfallversorgung und Arzneimittelkombinationstherapien im periinterventionellen Setting.</li>\n</ul>\n\n<ul>\n  <li><strong>Daraxonrasib bei vorbehandeltem RAS-mutiertem Pankreaskarzinom (NEJM):</strong> Daten zum ersten oral verfügbaren KRAS-Inhibitor in dieser Indikation werden im NEJM publiziert. Pancreaskarzinom mit RAS-Mutation gilt als therapeutisch besonders schwer zugänglich – positive Wirksamkeitssignale wären ein bedeutsamer Fortschritt in der Onkologie.</li>\n</ul>\n\n<ul>\n  <li><strong>mRNA-Influenza-Impfstoff: Wirksamkeit und Sicherheit in Erwachsenen (NEJM):</strong> Die Publikation liefert erstmals robuste klinische Phase-III-Daten für einen saisonalen mRNA-Grippe-Impfstoff. Angesichts der etablierten mRNA-Plattform nach COVID-19 ist dies ein strategisch relevanter Datenpunkt für Impfstoffhersteller und den Markt für saisonale Impfungen.</li>\n</ul>\n\n<ul>\n  <li><strong>Base Editing bei Sichelzellkrankheit – Editierung der HBG1/HBG2-Promotoren (NEJM):</strong> Der Ansatz zur Reaktivierung fötalen Hämoglobins via Basenpaar-Editierung zeigt die fortschreitende Reife von Gen-Editing-Technologien jenseits von CRISPR-Cas9. Sicherheits- und Effizienzprofile dieser Methode sind für die weitere klinische Entwicklung entscheidend – die NEJM-Publikation dürfte ein Meilenstein in der Gentherapie der Hämoglobinopathien sein.</li>\n</ul>\n\n<hr>\n\n<h2>⚠️ Regulatorisches</h2>\n\n<p><em>Für den 08.05.2026 liegen keine eigenständigen regulatorischen Meldungen vor.</em> Dennoch ergeben sich aus der Industrieberichterstattung regulatorisch relevante Signale:</p>\n\n<ul>\n  <li>Die <strong>FDA-Kritik an Alnylams Amvuttra-Website</strong> verdeutlicht, dass digitale Werbung konsequent auf Compliance zu prüfen ist.</li>\n  <li>Die <strong>geplante Neuprüfung von Ebvallo</strong> zeigt, dass unerwartete FDA-Ablehnungen nicht zwingend endgültig sind – Unternehmen sollten Eskalationspfade kennen und nutzen.</li>\n  <li>Das <strong>Blockieren von Impfstoff-Sicherheitsstudien</strong> durch die FDA ist ein regulatorisches Governance-Thema, das international beobachtet werden sollte.</li>\n</ul>\n\n<hr>\n\n<h2>📅 Ausblick</h2>\n\n<p>Die vollständigen Studiendaten zu Daraxonrasib und dem mRNA-Influenza-Impfstoff aus dem aktuellen NEJM-Heft sollten in den kommenden Tagen genau analysiert werden – beide Projekte haben das Potenzial, bestehende Therapiestandards zu verschieben. Parallel bleibt die Entwicklung rund um die FDA-Governance-Krise im Blick zu behalten: Sollten weitere Fälle von zurückgehaltenen Sicherheitsdaten bekannt werden, könnte dies internationale Regulierungsdiskussionen – auch auf EMA-Ebene –</p><details class=\"src-details\"><summary class=\"src-summary\"><span class=\"src-arrow\">▶</span>📰 Quellen &amp; Schlagzeilen (30 Artikel)</summary><div class=\"src-body\"><div class=\"src-category\"><div class=\"src-category-name\">Pharma-Industrie</div><div class=\"src-source\"><div class=\"src-source-name\">Fierce Pharma</div><div class=\"src-item\"><a href=\"https://www.fiercepharma.com/marketing/pre-launch-efforts-linked-lasting-drug-awareness-edge-report\" target=\"_blank\" class=\"src-link\">Pre-launch efforts linked to lasting drug awareness edge: report</a></div><div class=\"src-item\"><a href=\"https://www.fiercepharma.com/pharma/angelini-finds-catalyst-its-us-growth-ambitions-41b-buyout\" target=\"_blank\" class=\"src-link\">Angelini finds Catalyst for its US growth ambitions with $4.1B buyout</a></div><div class=\"src-item\"><a href=\"https://www.fiercepharma.com/manufacturing/timing-right-psychedelics-manufacturer-optimi-health\" target=\"_blank\" class=\"src-link\">The timing is right for psychedelics manufacturer Optimi Health's IPO</a></div><div class=\"src-item\"><a href=\"https://www.fiercepharma.com/pharma/fda-reconsider-surprisingly-rejected-cell-therapy-ebvallo-could-uniqure-be-next\" target=\"_blank\" class=\"src-link\">FDA to reconsider shock rejection of cell therapy Ebvallo. Could uniQure be next?</a></div><div class=\"src-item\"><a href=\"https://www.fiercepharma.com/marketing/insulet-ceo-details-scrubs-device-promotion-win-it-boosts-awareness-education-drive\" target=\"_blank\" class=\"src-link\">Insulet CEO details ‘Scrubs’ device promotion win as it boosts awareness const today = new Date().toISOString().slice(0, 10);
const nav = document.getElementById("nav");
const content = document.getElementById("content");

document.getElementById("count-label").textContent =
  briefings.length + " Ausgabe" + (briefings.length !== 1 ? "n" : "");

briefings.forEach((b, i) => {
  const item = document.createElement("div");
  item.className = "nav-item";
  item.dataset.id = b.id;
  const isToday = b.date === today;
  item.innerHTML = `
    <div class="nav-date">
      <div class="nav-weekday">${b.weekday}</div>
      <div class="nav-datestr">${b.date_display}</div>
    </div>
    ${isToday ? '<span class="today-badge">Heute</span>' : ""}
  `;
  item.addEventListener("click", () => show(b.id));
  nav.appendChild(item);

  const panel = document.createElement("div");
  panel.className = "briefing";
  panel.id = "briefing-" + b.id;
  panel.innerHTML = `<div class="briefing-card">${b.html}</div>`;
  content.appendChild(panel);
  enhanceCard(panel.querySelector('.briefing-card'));
});

function show(id) {
  document.querySelectorAll(".briefing").forEach(el => el.classList.remove("visible"));
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  document.getElementById("briefing-" + id)?.classList.add("visible");
  document.querySelector(`.nav-item[data-id="${id}"]`)?.classList.add("active");
  document.getElementById("main").scrollTo(0, 0);
}

if (briefings.length > 0) show(briefings[0].id);

const REPO = "amelgit/pharma-digest";
const WORKFLOW_FILE = "digest.yml";
const RUN_KEY = "pharma_digest_run";

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Store only the dispatch timestamp — runId is always re-fetched so we never
// hit the race where the user reloads before the runId is known.
function saveDispatch(t) { try { localStorage.setItem(RUN_KEY, String(t)); } catch(e) {} }
function clearRun()       { try { localStorage.removeItem(RUN_KEY); } catch(e) {} }
function loadDispatch() {
  try {
    const t = parseInt(localStorage.getItem(RUN_KEY) || "");
    if (!t) return null;
    if (Date.now() - t > 15 * 60 * 1000) { clearRun(); return null; }
    return t;
  } catch(e) { return null; }
}

function setProgress(pct, text, state) {
  document.getElementById("prog-wrap").style.display = "block";
  const fill = document.getElementById("prog-fill");
  fill.style.width = pct + "%";
  fill.className = "prog-fill" + (state === "done" ? " done" : state === "fail" ? " fail" : "");
  if (text != null) document.getElementById("prog-status").textContent = text;
}
function setBusy() {
  document.getElementById("refresh-btn").disabled = true;
  document.getElementById("refresh-icon").textContent = "⏳";
  document.getElementById("refresh-label").textContent = "Läuft…";
}
function resetBtn() {
  document.getElementById("refresh-btn").disabled = false;
  document.getElementById("refresh-icon").textContent = "🔄";
  document.getElementById("refresh-label").textContent = "Neu generieren";
  document.getElementById("prog-wrap").style.display = "none";
  document.getElementById("prog-fill").style.width = "0%";
}
function makeHeaders(token) {
  return {
    "Authorization": "Bearer " + token,
    "Accept": "application/vnd.github+json",
    "Content-Type": "application/json",
  };
}

// Find the workflow_dispatch run created at or after dispatchTime (±30s clock buffer).
// Retries for up to ~60s so it works whether the tab was reloaded immediately or later.
async function findRun(dispatchTime, headers) {
  for (let i = 0; i < 15; i++) {
    const res = await fetch(
      `https://api.github.com/repos/${REPO}/actions/runs?event=workflow_dispatch&per_page=5`,
      { headers }
    );
    if (!res.ok) throw new Error("API-Fehler: " + res.status);
    const runs = (await res.json()).workflow_runs || [];
    // Runs are newest-first; find the first one created after our dispatch
    const run = runs.find(r => new Date(r.created_at).getTime() >= dispatchTime - 30_000);
    if (run) return run;
    await sleep(4000);
  }
  return null;
}

async function pollUntilDone(runId, dispatchTime, headers) {
  while (true) {
    const res = await fetch(
      `https://api.github.com/repos/${REPO}/actions/runs/${runId}`,
      { headers }
    );
    if (!res.ok) throw new Error("API-Fehler: " + res.status);
    const run = await res.json();
    const elapsed = Date.now() - dispatchTime;

    if (run.status === "queued") {
      setProgress(15, "⏳ In Warteschlange…");
    } else if (run.status === "in_progress") {
      const pct = Math.min(90, 20 + (elapsed / 120_000) * 70);
      const label =
        elapsed < 35_000 ? "📡 Pharma-Quellen werden abgerufen…" :
        elapsed < 80_000 ? "🤖 Briefing wird mit Claude generiert…" :
                           "💾 Briefing wird gespeichert & gepusht…";
      setProgress(pct, label);
    } else if (run.status === "completed") {
      clearRun();
      if (run.conclusion === "success") {
        setProgress(100, "✅ Fertig! Seite wird neu geladen…", "done");
        await sleep(1800);
        window.location.reload();
        return;
      } else {
        throw new Error("Fehlgeschlagen: " + run.conclusion);
      }
    }
    await sleep(8000);
  }
}

async function triggerRebuild() {
  const token = new URLSearchParams(window.location.hash.slice(1)).get("token");
  if (!token) {
    alert("Kein Token in der URL gefunden.\n\nBitte die Seite mit #token=DEIN_TOKEN aufrufen.");
    return;
  }
  setBusy();
  setProgress(5, "Verbindung zu GitHub…");
  const headers = makeHeaders(token);

  try {
    const res = await fetch(
      `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches`,
      { method: "POST", headers, body: JSON.stringify({ ref: "main" }) }
    );
    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      throw new Error(j.message || "HTTP " + res.status);
    }

    // Save timestamp IMMEDIATELY after confirmed dispatch — before any run search —
    // so a page reload at any point can still resume.
    const dispatchTime = Date.now();
    saveDispatch(dispatchTime);
    setProgress(10, "Workflow ausgelöst – suche Run…");
    await sleep(5000);

    const run = await findRun(dispatchTime, headers);
    if (!run) throw new Error("Kein Workflow-Run gefunden");

    setProgress(20, "Workflow gestartet");
    await pollUntilDone(run.id, dispatchTime, headers);
  } catch (err) {
    clearRun();
    setProgress(100, "✗ " + err.message, "fail");
    await sleep(3000);
    resetBtn();
  }
}

// On every page load: if a dispatch timestamp is saved, find and resume the run.
(async function resumeIfActive() {
  const dispatchTime = loadDispatch();
  if (!dispatchTime) return;
  const token = new URLSearchParams(window.location.hash.slice(1)).get("token");
  if (!token) { clearRun(); return; }

  setBusy();
  const elapsed = Date.now() - dispatchTime;
  setProgress(Math.min(85, 10 + (elapsed / 120_000) * 75), "Verbinde mit laufendem Workflow…");
  const headers = makeHeaders(token);

  try {
    const run = await findRun(dispatchTime, headers);
    if (!run) {
      // Not found: run likely completed before this reload and the tab was closed
      // (clearRun was never called). Reset cleanly.
      clearRun();
      resetBtn();
      return;
    }
    // If already completed, pollUntilDone handles it immediately (success → reload, else error)
    await pollUntilDone(run.id, dispatchTime, headers);
  } catch (err) {
    clearRun();
    setProgress(100, "✗ " + err.message, "fail");
    await sleep(3000);
    resetBtn();
  }
})();
</script>

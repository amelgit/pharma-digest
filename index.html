<html lang="de">

<title>Pharma Digest</title>
<style>
  :root {
    --sidebar-bg: #0f172a;
    --sidebar-text: #cbd5e1;
    --sidebar-active: #f1f5f9;
    --sidebar-hover: #1e293b;
    --sidebar-accent: #0ea5e9;
    --main-bg: #f8fafc;
    --card-bg: #ffffff;
    --text: #0f172a;
    --text-muted: #64748b;
    --heading: #0f172a;
    --border: #e2e8f0;
    --hr: #e2e8f0;
    --link: #0284c7;
    --code-bg: #f1f5f9;

    --sidebar-w: 260px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--main-bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  #sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid #1e293b;
  }
  #sidebar-header h1 {
    font-size: 15px;
    font-weight: 700;
    color: #f1f5f9;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  #sidebar-header p {
    font-size: 12px;
    color: var(--sidebar-text);
    margin-top: 4px;
  }
  #refresh-btn {
    margin-top: 12px;
    width: 100%;
    padding: 7px 12px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 6px;
    color: #94a3b8;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  #refresh-btn:hover { background: #263244; color: #e2e8f0; border-color: #475569; }
  #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #refresh-btn.success { color: #4ade80; border-color: #166534; }
  #refresh-btn.error   { color: #f87171; border-color: #7f1d1d; }
  #prog-wrap { margin-top: 10px; display: none; }
  .prog-track {
    height: 2px;
    background: #1e293b;
    border-radius: 2px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    width: 0%;
    background: var(--sidebar-accent);
    border-radius: 2px;
    transition: width 1.2s ease;
  }
  .prog-fill.done { background: #4ade80; }
  .prog-fill.fail { background: #f87171; }
  .prog-status {
    margin-top: 7px;
    font-size: 11px;
    color: #94a3b8;
    line-height: 1.4;
  }
  #nav {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
  }
  #nav::-webkit-scrollbar { width: 4px; }
  #nav::-webkit-scrollbar-track { background: transparent; }
  #nav::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .nav-item:hover { background: var(--sidebar-hover); }
  .nav-item.active {
    background: #0c2d48;
    border-left-color: var(--sidebar-accent);
  }
  .nav-date { flex: 1; }
  .nav-weekday {
    font-size: 11px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .nav-datestr {
    font-size: 13px;
    color: var(--sidebar-active);
    font-weight: 500;
    margin-top: 1px;
  }
  .nav-item.active .nav-datestr { color: #7dd3fc; }
  .today-badge {
    font-size: 10px;
    font-weight: 600;
    background: var(--today-badge);
    color: white;
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.03em;
  }

  /* ── Main content ── */
  #main {
    flex: 1;
    overflow-y: auto;
    padding: 40px;
  }
  #main::-webkit-scrollbar { width: 6px; }
  #main::-webkit-scrollbar-track { background: var(--main-bg); }
  #main::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  .briefing { display: none; }
  .briefing.visible { display: block; }
  .briefing-card {
    max-width: 780px;
    margin: 0 auto;
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
    padding: 40px 48px;
  }
  .briefing-card h1 {
    font-size: 26px;
    font-weight: 800;
    color: var(--heading);
    line-height: 1.25;
    margin-bottom: 6px;
  }
  .briefing-card h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--heading);
    margin: 32px 0 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--border);
  }
  .briefing-card h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--heading);
    margin: 20px 0 8px;
  }
  .briefing-card p {
    font-size: 15px;
    line-height: 1.75;
    color: #334155;
    margin-bottom: 12px;
  }
  .briefing-card ul {
    list-style: none;
    padding: 0;
    margin-bottom: 8px;
  }
  .briefing-card ul li {
    font-size: 15px;
    line-height: 1.7;
    color: #334155;
    padding: 5px 0 5px 20px;
    position: relative;
  }
  .briefing-card ul li::before {
    content: "→";
    position: absolute;
    left: 0;
    color: var(--sidebar-accent);
    font-size: 13px;
    top: 7px;
  }
  .briefing-card hr {
    border: none;
    border-top: 1px solid var(--hr);
    margin: 24px 0;
  }
  .briefing-card strong { color: var(--heading); }
  .briefing-card em { color: #475569; }
  .briefing-card code {
    background: var(--code-bg);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 13px;
  }
  .briefing-card a {
    color: var(--link);
    text-decoration: none;
  }
  .briefing-card a:hover { text-decoration: underline; }

  /* ── Market Widget ── */
  .mkt-widget {
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 28px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .mkt-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .mkt-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--heading);
  }
  .mkt-date-label {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .mkt-table {
    width: 100%;
    min-width: 540px;
    border-collapse: collapse;
  }
  .mkt-table th {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 0 6px 6px;
    border-bottom: 1px solid var(--border);
    text-align: right;
    white-space: nowrap;
  }
  .mkt-table th:first-child { text-align: left; }
  .mkt-table th:nth-child(3) { text-align: left; }
  .mkt-table td {
    padding: 5px 6px;
    border-bottom: 1px solid #f1f5f9;
    vertical-align: middle;
    font-size: 12px;
  }
  .mkt-table tr:last-child td { border-bottom: none; }
  .mkt-name { font-weight: 600; color: var(--heading); white-space: nowrap; }
  .mkt-close {
    text-align: right;
    font-family: "SF Mono", "Fira Code", monospace;
    color: var(--text);
    white-space: nowrap;
  }
  .mkt-range { min-width: 120px; padding-top: 7px !important; padding-bottom: 7px !important; }
  .mkt-range-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--text-muted);
    font-family: "SF Mono", "Fira Code", monospace;
    margin-bottom: 3px;
  }
  .mkt-track {
    height: 3px;
    background: #e2e8f0;
    border-radius: 2px;
    position: relative;
  }
  .mkt-dot {
    position: absolute;
    width: 8px;
    height: 8px;
    background: var(--sidebar-accent);
    border-radius: 50%;
    top: -2.5px;
    transform: translateX(-50%);
    box-shadow: 0 0 0 2px #f8fafc;
  }
  .mkt-pct {
    text-align: right;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .mkt-pos { color: #16a34a; }
  .mkt-neg { color: #dc2626; }
  .mkt-neutral { color: var(--text-muted); }
  .mkt-day { border-left: 2px solid var(--border); }
  .mkt-link { color: inherit; text-decoration: none; border-bottom: 1px dotted #94a3b8; }
  .mkt-link:hover { color: var(--link); border-bottom-color: var(--link); }
  .mkt-status { font-size: 9px; margin-right: 5px; }
  .mkt-status-open   { color: #22c55e; }
  .mkt-status-pre    { color: #f59e0b; }
  .mkt-status-post   { color: #f59e0b; }
  .mkt-status-closed { color: #cbd5e1; }
  .mkt-pre {
    display: block;
    font-size: 10px;
    font-family: "SF Mono", "Fira Code", monospace;
    margin-top: 2px;
  }
  .mkt-pre-label { color: var(--text-muted); }
  .mkt-pre-pos { color: #16a34a; }
  .mkt-pre-neg { color: #dc2626; }
  .mkt-analysis {
    margin-top: 14px;
    padding: 12px 16px;
    background: #f0f9ff;
    border: 1px solid #bae6fd;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.65;
    color: #0c2d48;
  }
  .mkt-analysis-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #0ea5e9;
    margin-bottom: 6px;
  }
  .mkt-analysis p { margin: 0 0 6px; font-size: 13px; color: #0c2d48; line-height: 1.65; }
  .mkt-analysis p:last-child { margin-bottom: 0; }

  /* ── Sources ── */
  .src-details {
    margin-top: 32px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .src-summary {
    cursor: pointer;
    padding: 11px 16px;
    background: #f8fafc;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    list-style: none;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .src-summary::-webkit-details-marker { display: none; }
  .src-arrow { font-size: 9px; transition: transform 0.15s; display: inline-block; }
  details[open] .src-arrow { transform: rotate(90deg); }
  .src-body { padding: 16px 20px; }
  .src-category { margin-bottom: 20px; }
  .src-category:last-child { margin-bottom: 0; }
  .src-category-name {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--sidebar-accent);
    margin-bottom: 10px;
  }
  .src-source { margin-bottom: 14px; }
  .src-source:last-child { margin-bottom: 0; }
  .src-source-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 5px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .src-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
    padding: 4px 0;
    border-bottom: 1px solid #f8fafc;
  }
  .src-item:last-child { border-bottom: none; }
  .src-link {
    font-size: 13px;
    color: var(--text);
    text-decoration: none;
    flex: 1;
    line-height: 1.4;
  }
  .src-link:hover { color: var(--link); text-decoration: underline; }
  .src-no-link { font-size: 13px; color: var(--text); flex: 1; line-height: 1.4; }
  .src-date {
    font-size: 10px;
    color: var(--text-muted);
    white-space: nowrap;
    font-family: "SF Mono", "Fira Code", monospace;
    flex-shrink: 0;
  }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    body { flex-direction: column; overflow: auto; height: auto; }
    #sidebar { width: 100%; min-width: unset; height: auto; }
    #nav { display: flex; overflow-x: auto; padding: 8px; gap: 6px; }
    .nav-item { min-width: 130px; border-left: none; border-bottom: 3px solid transparent; border-radius: 8px; }
    .nav-item.active { border-bottom-color: var(--sidebar-accent); }
    #main { padding: 20px 16px; }
    .briefing-card { padding: 24px 20px; }
    .mkt-widget { padding: 14px 14px; }
    /* hide 52W range, 1M, YTD on small screens — keep name, price, Δ1T, 1T%, 1W */
    .mkt-table th:nth-child(5), .mkt-table td:nth-child(5),
    .mkt-table th:nth-child(7), .mkt-table td:nth-child(7),
    .mkt-table th:nth-child(8), .mkt-table td:nth-child(8) { display: none; }
  }
</style>
</head>

tionsvertrauen in die Branche stützen. Der leichte Rückgang bei <strong>Bayer (-1,22 %)</strong> könnte teilweise auf anhaltende regulatorische Unsicherheiten in den USA zurückzuführen sein, da die FDA-Governance-Diskussion rund um zurückgehaltene Sicherheitsstudien das allgemeine Investorenvertrauen in US-regulierungsabhängige Produkte belasten kann. Insgesamt spiegeln die Bewegungen eine <strong>gemischte, sektoral differenzierte Reaktion</strong> wider, bei der die großen Ausreißer – Merck KGaA nach oben, Fresenius nach unten – aus den gestrigen Branchennachrichten allein nicht befriedigend erklärt werden können und unternehmensindividuelle Faktoren die entscheidende Rolle gespielt haben dürften.</p></div></div>\n\n<h1>Pharma-Briefing | 14. Mai 2026</h1>\n\n<hr>\n\n<h2>Einleitung</h2>\n\n<p>Der heutige Tag steht im Zeichen bedeutender Zulassungsentscheidungen, intensiver klinischer Datenlage in der Onkologie und Kardiologie sowie weitreichender struktureller Umbrüche in der Pharmaindustrie. Besonders im Fokus: neue Therapieoptionen bei hämatologischen Malignomen, die sich verschärfende GLP-1-Rivalität sowie vielversprechende Daten zu mRNA-Technologien jenseits von COVID-19.</p>\n\n<hr>\n\n<h2>🏭 Pharma-Industrie</h2>\n\n<ul>\n  <li><strong>FDA-Zulassung für Beqalzi (Sonrotoclax):</strong> BeOne Medicines erhält die FDA-Zulassung für Beqalzi als ersten BCL-2-Inhibitor zur Behandlung des Mantelzell-Lymphoms – eine direkte Konkurrenz zu AbbVies Venclexta (Venetoclax). Diese Zulassung eröffnet einen neuen Wettbewerbsraum im BCL-2-Segment und dürfte Druck auf bestehende Marktpositionen ausüben. Für die Industrie relevant: Die Differenzierung über Indikationsspezifität wird zunehmend zum strategischen Hebel.</li>\n</ul>\n\n<ul>\n  <li><strong>Merck KGaA prüft M&A-Optionen:</strong> Das Darmstädter Unternehmen gibt offen zu, dass die eigene Pipeline als „eher dünn\" eingestuft wird, und sucht aktiv nach Zukäufen. Dies signalisiert einen möglichen Konsolidierungsschub im europäischen Pharmamarkt – mit potenziellen Auswirkungen auf Partnerschaften, Lizenzen und Forschungskooperationen.</li>\n</ul>\n\n<ul>\n  <li><strong>Takeda streicht 4.500 Stellen:</strong> Im Rahmen eines umfangreichen Restrukturierungsprogramms kündigt Takeda den Abbau von rund 4.500 Stellen an. Zusammen mit ähnlichen Maßnahmen bei Valneva (bis zu 15 % der Belegschaft aufgrund rückläufiger Reisenachfrage nach Impfstoffen) zeichnet sich ein branchenweiter Kostendruck ab, der Produktportfolios und Forschungsschwerpunkte nachhaltig verschieben wird.</li>\n</ul>\n\n<ul>\n  <li><strong>GLP-1-Rivalität zwischen Novo Nordisk und Eli Lilly verschärft sich:</strong> Beide Unternehmen präsentieren neue Daten – Novo Nordisk zu frühen Ansprechraten, Lilly zur Gewichtsreduktionsmaintenance mit Tirzepatid. Der Wettbewerb verlagert sich zunehmend auf Nuancen der klinischen Performance, was die Differenzierung im Markt verkompliziert und regulatorische sowie medizinisch-wissenschaftliche Kommunikation in den Vordergrund rückt.</li>\n</ul>\n\n<ul>\n  <li><strong>FDA rügt Brukinsa-Werbekampagne von BeOne:</strong> Die FDA-Werbeaufsicht beanstandet die TV-Kampagne „Clarity\" für Brukinsa (Zanubrutinib) wegen irreführender Aussagen. Dies ist eine Erinnerung daran, dass auch für onkologische Präparate strenge Anforderungen an die Produktkommunikation gelten – insbesondere bei Direktwerbung gegenüber Verbrauchern.</li>\n</ul>\n\n<hr>\n\n<h2>🔬 Klinische Forschung</h2>\n\n<ul>\n  <li><strong>mRNA-Influenza-Impfstoff zeigt Wirksamkeit und akzeptables Sicherheitsprofil (NEJM):</strong> Eine aktuelle NEJM-Studie zur Wirksamkeit und Sicherheit eines mRNA-basierten saisonalen Influenza-Impfstoffs bei Erwachsenen liefert weitere Belege für die Übertragbarkeit der mRNA-Plattform auf andere Infektionskrankheiten. Dies ist von strategischer Bedeutung für Hersteller, die ihre mRNA-Kapazitäten über COVID-19 hinaus skalieren.</li>\n</ul>\n\n<ul>\n  <li><strong>Base Editing bei Sichelzellkrankheit – Gentherapie auf dem Vormarsch (NEJM):</strong> Die Studie zur Basiseditor-gestützten Aktivierung der fetalen Hämoglobinsynthese über HBG1/HBG2-Promotoren bei Sichelzellkrankheit erweitert das therapeutische Arsenal in der Gentherapie. Nach Zynteglo und Casgevy rückt ein weiterer Ansatz in die klinische Sichtbarkeit – relevant für Unternehmen mit Engagement in der Hämoglobinopathie-Forschung.</li>\n</ul>\n\n<ul>\n  <li><strong>Oraler PCSK9-Inhibitor Enlicitide in klinischer Prüfung (NEJM):</strong> Daten zum oralen PCSK9-Inhibitor Enlicitide im NEJM deuten auf eine mögliche Neuausrichtung der Lipidtherapie hin. Sollte sich das Wirksamkeitsprofil im Vergleich zu subkutanen Antikörpern behaupten, könnte dies die Adhärenz bei Hochrisikopatienten erheblich verbessern – ein zentrales Anliegen für Versorgungsforschung und Marktzulassung in Europa.</li>\n</ul>\n\n<ul>\n  <li><strong>Tirzepatid-Erhaltungstherapie bei Adipositas: SURMOUNT-MAINTAIN-Daten (The Lancet):</strong> Die randomisierte, placebokontrollierte SURMOUNT-MAINTAIN-Studie liefert Evidenz zur langfristigen Gewichtsmaintenance unter Tirzepatid nach initialer Gewichtsreduktion. Angesichts der bekannten Gewichtszunahme nach Absetzen von GLP-1-Agonisten sind diese Daten klinisch und gesundheitsökonomisch hochrelevant – auch im Hinblick auf die Erstattungsfähigkeit im deutschen GKV-Kontext.</li>\n</ul>\n\n<ul>\n  <li><strong>TAPIS-Studie: Duale Plättchenhemmung plus Thrombolyse beim ischämischen Schlaganfall (The Lancet):</strong> Die TAPIS-Studie untersucht die Kombination aus Ticagrelor/ASS und intravenöser Thrombolyse bei Schlaganfallpatienten in China. Erste Kommentare bewerten die Ergebnisse als positiv für ein definiertes Patientenphänotyp – dies könnte Einfluss auf internationale Leitlinienrevisionen haben und damit mittelbar auf die Arzneimittelversorgung in spezialisierten Behandlungszentren.</li>\n</ul>\n\n<hr>\n\n<h2>⚖️ Regulatorisches</h2>\n\n<ul>\n  <li><strong>Pfizer erhält europäische Erweiterung für Hympavzi in der Hämophilie:</strong> Laut dem Fierce-Pharma-Regulatory-Tracker wurde Hympavzi (Marstacimab) eine Indikationserweiterung in Europa für die Hämophiliebehandlung gewährt. Dies stärkt Pfizers Position im Gerinnungsbereich und ist für Krankenhausapotheken sowie Einkaufsgemeinschaften im seltenen Erkrankungsbereich relevant.</li>\n</ul>\n\n<ul>\n  <li><strong>Keine weiteren regulatorischen Meldungen verfügbar:</strong> Für heute liegen keine weiteren EMA-, BfArM- oder FDA-Entscheidungen mit unmittelbarer Relevanz für den deutschen Markt vor. Eine aktive Überwachung der EMA-Datenbank und des BfArM-Portals wird empfohlen.</li>\n</ul>\n\n<hr>\n\n<h2>📅 Ausblick</h2>\n\n<p>Die kommenden Tage werden zeigen, ob die SURMOUNT-MAINTAIN-Daten zu Tirzepatid eine breitere Diskussion über die Dauerbehandlung bei Adipositas – und damit verbundene Erstattungsfragen in Deutschland – auslösen. Ebenso sollte die M&A-Aktivität von Merck KGaA sowie mögliche weitere Konsolidierungsschritte im europäischen Biotechsektor eng beobachtet werden.</p><details class=\"src-details\"><summary class=\"src-summary\"><span class=\"src-arrow\">▶</span>📰 Quellen &amp; Schlagzeilen (30 Artikel)</summary><div class=\"src-body\"><div class=\"src-category\"><div class=\"src-category-name\">Pharma-Industrie</div><div class=\"src-source\"><div class=\"src-source-name\">Fierce Pharma</div><div class=\"src-item\"><a href=\"https://www.fiercepharma.com/pharma/beone-venclexta-challenger-beqalzi-sonrotoclax-nets-fda-approval-first-bcl-2-mantle-cell\" target=\"_blank\" class=\"src-link\">&lt;a href=\"https://www.fiercepharma.com/pharma/beone-venclexta-challenger-beqalzi-sonrotoclax-nets-fda-approval-first-bcl-2-mantle-cell\" hreflang=\"en\"&gt;BeOne's Venclexta challenger Beqalzi nets FDA approval as first BCL-2 for mantle cell lymphoma&lt;/a&gt;</a></div><div class=\"src-item\"><a href=\"https://www.fiercepharma.com/pharma/trump-arrives-china-big-pharma-ceos-are-notably-absent\" target=\"_blank\" cl     "html": "<h1>Pharma-Briefing – 08. Mai 2026</h1>\n\n<hr>\n\n<h2>Einleitung</h2>\n\n<p>Der heutige Tag steht im Zeichen wegweisender klinischer Daten aus der Schlaganfall- und Onkologieforschung sowie strategischer Bewegungen im Pharmamarkt – allen voran der milliardenschwere US-Expansion von Angelini und das starke Debüt von Novo Nordisks oraler Semaglutid-Formulierung. Auf regulatorischer Seite sorgt die FDA mit mehreren ungewöhnlichen Entscheidungen für Gesprächsstoff, die das Vertrauen in Zulassungsprozesse und Kommunikationsstandards berühren.</p>\n\n<hr>\n\n<h2>🏭 Pharma-Industrie</h2>\n\n<ul>\n  <li><strong>Angelini übernimmt Catalyst Biosciences für 4,1 Mrd. USD:</strong> Das italienische Pharmaunternehmen setzt damit ein klares Signal für seine US-Wachsamkeitsstrategie. Die Transaktion unterstreicht den anhaltenden Konsolidierungsdruck im Markt – insbesondere für mittelgroße Unternehmen, die in der Neurologie und Psychiatrie aktiv sind, zwei Kernbereiche von Angelini.</li>\n</ul>\n\n<ul>\n  <li><strong>Novo Nordisks oraler Wegovy (Semaglutid-Tablette) erzielt 355 Mio. USD im Erstquartal:</strong> CEO Lars Fruergaard Jørgensen spricht von einem Preis-„Sweet Spot\", der Accessibilität und Margenerwartungen balanciert. Für Industrieapotheker relevant: Die orale Bioverfügbarkeit von GLP-1-Agonisten gilt nach wie vor als formulierungstechnische Herausforderung – der kommerzielle Erfolg bestätigt, dass diese überwunden ist.</li>\n</ul>\n\n<ul>\n  <li><strong>FDA überdenkt die Ablehnung der Zelltherapie Ebvallo (Tabelecleucel):</strong> Die überraschende Ablehnung der EBV-spezifischen T-Zell-Therapie war ein Rückschlag für den Hersteller Pierre Fabre. Die FDA-Bereitschaft zur Neuprüfung ist ein positives Signal für die Zelltherapie-Pipeline insgesamt – und könnte präzedenzwirksam für uniQure und andere sein.</li>\n</ul>\n\n<ul>\n  <li><strong>FDA rügt Alnylam wegen Wirksamkeitsbehauptungen auf der Amvuttra-Website:</strong> Die FDA kritisierte irreführende Effektivitätsangaben für den RNAi-Wirkstoff Vutrisiran (ATTR-Amyloidose). Für Regulatory-Affairs-Teams ein Warnsignal: Auch digitale Kommunikationskanäle unterliegen strenger Werbeaufsicht – Compliance-Überprüfungen von Online-Inhalten sind essenziell.</li>\n</ul>\n\n<ul>\n  <li><strong>FDA blockiert Veröffentlichung von Sicherheitsstudien zu COVID- und Gürtelrose-Impfstoffen (NYT):</strong> Laut <em>New York Times</em> verhindert die FDA die Publikation behördlich beauftragter Sicherheitsanalysen. Dies ist im Kontext der aktuellen politischen Einflussnahme auf US-Gesundheitsbehörden besorgniserregend und könnte das internationale Vertrauen in regulatorische Transparenz beschädigen – ein Thema, das auch für EMA und AGES relevant ist.</li>\n</ul>\n\n<hr>\n\n<h2>🔬 Klinische Forschung</h2>\n\n<ul>\n  <li><strong>TAPIS-Studie (Lancet): Duale Thrombozytenhemmung plus Thrombolyse beim ischämischen Schlaganfall:</strong> Die randomisierte, doppelblinde chinesische Multicenterstudie zeigt positive Ergebnisse für Ticagrelor plus Aspirin in Kombination mit intravenöser Thrombolyse bei einem definierten Schlaganfallphänotyp. Die begleitenden Kommentare betonen die Relevanz der Patientenselektion – ein wichtiges Signal für zukünftige Leitlinienentwicklungen in der Schlaganfalltherapie.</li>\n</ul>\n\n<ul>\n  <li><strong>ATLAS-Metaanalyse (Lancet): Thrombektomie bis 24 h nach Schlaganfall auch bei großem Infarkt-Core wirksam:</strong> Die individuelle Patientendaten-Metaanalyse bestätigt den Nutzen der endovaskulären Thrombektomie auch bei ausgedehnten Infarkten (niedrige ASPECTS-Scores) bis zu 24 Stunden nach Symptombeginn. Dies erweitert das therapeutische Fenster erheblich und hat direkte Implikationen für die Schlaganfallversorgung und Arzneimittelkombinationstherapien im periinterventionellen Setting.</li>\n</ul>\n\n<ul>\n  <li><strong>Daraxonrasib bei vorbehandeltem RAS-mutiertem Pankreaskarzinom (NEJM):</strong> Daten zum ersten oral verfügbaren KRAS-Inhibitor in dieser Indikation werden im NEJM publiziert. Pancreaskarzinom mit RAS-Mutation gilt als therapeutisch besonders schwer zugänglich – positive Wirksamkeitssignale wären ein bedeutsamer Fortschritt in der Onkologie.</li>\n</ul>\n\n<ul>\n  <li><strong>mRNA-Influenza-Impfstoff: Wirksamkeit und Sicherheit in Erwachsenen (NEJM):</strong> Die Publikation liefert erstmals robuste klinische Phase-III-Daten für einen saisonalen mRNA-Grippe-Impfstoff. Angesichts der etablierten mRNA-Plattform nach COVID-19 ist dies ein strategisch relevanter Datenpunkt für Impfstoffhersteller und den Markt für saisonale Impfungen.</li>\n</ul>\n\n<ul>\n  <li><strong>Base Editing bei Sichelzellkrankheit – Editierung der HBG1/HBG2-Promotoren (NEJM):</strong> Der Ansatz zur Reaktivierung fötalen Hämoglobins via Basenpaar-Editierung zeigt die fortschreitende Reife von Gen-Editing-Technologien jenseits von CRISPR-Cas9. Sicherheits- und Effizienzprofile dieser Methode sind für die weitere klinische Entwicklung entscheidend – die NEJM-Publikation dürfte ein Meilenstein in der Gentherapie der Hämoglobinopathien sein.</li>\n</ul>\n\n<hr>\n\n<h2>⚠️ Regulatorisches</h2>\n\n<p><em>Für den 08.05.2026 liegen keine eigenständigen regulatorischen Meldungen vor.</em> Dennoch ergeben sich aus der Industrieberichterstattung regulatorisch relevante Signale:</p>\n\n<ul>\n  <li>Die <strong>FDA-Kritik an Alnylams Amvuttra-Website</strong> verdeutlicht, dass digitale Werbung konsequent auf Compliance zu prüfen ist.</li>\n  <li>Die <strong>geplante Neuprüfung von Ebvallo</strong> zeigt, dass unerwartete FDA-Ablehnungen nicht zwingend endgültig sind – Unternehmen sollten Eskalationspfade kennen und nutzen.</li>\n  <li>Das <strong>Blockieren von Impfstoff-Sicherheitsstudien</strong> durch die FDA ist ein regulatorisches Governance-Thema, das international beobachtet werden sollte.</li>\n</ul>\n\n<hr>\n\n<h2>📅 Ausblick</h2>\n\n<p>Die vollständigen Studiendaten zu Daraxonrasib und dem mRNA-Influenza-Impfstoff aus dem aktuellen NEJM-Heft sollten in den kommenden Tagen genau analysiert werden – beide Projekte haben das Potenzial, bestehende Therapiestandards zu verschieben. Parallel bleibt die Entwicklung rund um die FDA-Governance-Krise im Blick zu behalten: Sollten weitere Fälle von zurückgehaltenen Sicherheitsdaten bekannt werden, könnte dies internationale Regulierungsdiskussionen – auch auf EMA-Ebene –</p><details class=\"src-details\"><summary class=\"src-summary\"><span class=\"src-arrow\">▶</span>📰 Quellen &amp; Schlagzeilen (30 Artikel)</summary><div class=\"src-body\"><div class=\"src-category\"><div class=\"src-category-name\">Pharma-Industrie</div><div class=\"src-source\"><div class=\"src-source-name\">Fierce Pharma</div><div class=\"src-item\"><a href=\"https://www.fiercepharma.com/marketing/pre-launch-efforts-linked-lasting-drug-awareness-edge-report\" target=\"_blank\" class=\"src-link\">&lt;a href=\"https://www.fiercepharma.com/marketing/pre-launch-efforts-linked-lasting-drug-awareness-edge-report\" hreflang=\"en\"&gt;Pre-launch efforts linked to lasting drug awareness edge: report&lt;/a&gt;</a></div><div class=\"src-item\"><a href=\"https://www.fiercepharma.com/pharma/angelini-finds-catalyst-its-us-growth-ambitions-41b-buyout\" target=\"_blank\" class=\"src-link\">&lt;a href=\"https://www.fiercepharma.com/pharma/angelini-finds-catalyst-its-us-growth-ambitions-41b-buyout\" hreflang=\"en\"&gt;Angelini finds Catalyst for its US growth ambitions with $4.1B buyout&lt;/a&gt;</a></div><div class=\"src-item\"><a href=\"https://www.fiercepharma.com/manufacturing/timing-right-psychedelics-manufacturer-optimi-health\" target=\"_blank\" class=\"src-link\">&lt;a href=\"https://www.fiercepharma.com/manufacturing/timing-right-psychedelics-manufacturer-optimi-health\" hreflang=\"en\"&gt;The timing is right for psychedelics manufacturer Optimi Health's IPO&lt;/a&gt;</a></div><div class=\"src-item\"><a href=\"https://www.fiercepharma.com/pharma/fda-reconsider-surprisingly-rejected-cell-therapy-ebval const today = new Date().toISOString().slice(0, 10);
const nav = document.getElementById("nav");
const content = document.getElementById("content");

document.getElementById("count-label").textContent =
  briefings.length + " Ausgabe" + (briefings.length !== 1 ? "n" : "");

briefings.forEach((b, i) => {
  const item = document.createElement("div");
  item.className = "nav-item";
  item.dataset.id = b.id;
  const isToday = b.date === today;
  item.innerHTML = `
    <div class="nav-date">
      <div class="nav-weekday">${b.weekday}</div>
      <div class="nav-datestr">${b.date_display}</div>
    </div>
    ${isToday ? '<span class="today-badge">Heute</span>' : ""}
  `;
  item.addEventListener("click", () => show(b.id));
  nav.appendChild(item);

  const panel = document.createElement("div");
  panel.className = "briefing";
  panel.id = "briefing-" + b.id;
  panel.innerHTML = `<div class="briefing-card">${b.html}</div>`;
  content.appendChild(panel);
});

function show(id) {
  document.querySelectorAll(".briefing").forEach(el => el.classList.remove("visible"));
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  document.getElementById("briefing-" + id)?.classList.add("visible");
  document.querySelector(`.nav-item[data-id="${id}"]`)?.classList.add("active");
  document.getElementById("main").scrollTo(0, 0);
}

if (briefings.length > 0) show(briefings[0].id);

const REPO = "amelgit/pharma-digest";
const WORKFLOW_FILE = "digest.yml";
const RUN_KEY = "pharma_digest_run";

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Store only the dispatch timestamp — runId is always re-fetched so we never
// hit the race where the user reloads before the runId is known.
function saveDispatch(t) { try { localStorage.setItem(RUN_KEY, String(t)); } catch(e) {} }
function clearRun()       { try { localStorage.removeItem(RUN_KEY); } catch(e) {} }
function loadDispatch() {
  try {
    const t = parseInt(localStorage.getItem(RUN_KEY) || "");
    if (!t) return null;
    if (Date.now() - t > 15 * 60 * 1000) { clearRun(); return null; }
    return t;
  } catch(e) { return null; }
}

function setProgress(pct, text, state) {
  document.getElementById("prog-wrap").style.display = "block";
  const fill = document.getElementById("prog-fill");
  fill.style.width = pct + "%";
  fill.className = "prog-fill" + (state === "done" ? " done" : state === "fail" ? " fail" : "");
  if (text != null) document.getElementById("prog-status").textContent = text;
}
function setBusy() {
  document.getElementById("refresh-btn").disabled = true;
  document.getElementById("refresh-icon").textContent = "⏳";
  document.getElementById("refresh-label").textContent = "Läuft…";
}
function resetBtn() {
  document.getElementById("refresh-btn").disabled = false;
  document.getElementById("refresh-icon").textContent = "🔄";
  document.getElementById("refresh-label").textContent = "Neu generieren";
  document.getElementById("prog-wrap").style.display = "none";
  document.getElementById("prog-fill").style.width = "0%";
}
function makeHeaders(token) {
  return {
    "Authorization": "Bearer " + token,
    "Accept": "application/vnd.github+json",
    "Content-Type": "application/json",
  };
}

// Find the workflow_dispatch run created at or after dispatchTime (±30s clock buffer).
// Retries for up to ~60s so it works whether the tab was reloaded immediately or later.
async function findRun(dispatchTime, headers) {
  for (let i = 0; i < 15; i++) {
    const res = await fetch(
      `https://api.github.com/repos/${REPO}/actions/runs?event=workflow_dispatch&per_page=5`,
      { headers }
    );
    if (!res.ok) throw new Error("API-Fehler: " + res.status);
    const runs = (await res.json()).workflow_runs || [];
    // Runs are newest-first; find the first one created after our dispatch
    const run = runs.find(r => new Date(r.created_at).getTime() >= dispatchTime - 30_000);
    if (run) return run;
    await sleep(4000);
  }
  return null;
}

async function pollUntilDone(runId, dispatchTime, headers) {
  while (true) {
    const res = await fetch(
      `https://api.github.com/repos/${REPO}/actions/runs/${runId}`,
      { headers }
    );
    if (!res.ok) throw new Error("API-Fehler: " + res.status);
    const run = await res.json();
    const elapsed = Date.now() - dispatchTime;

    if (run.status === "queued") {
      setProgress(15, "⏳ In Warteschlange…");
    } else if (run.status === "in_progress") {
      const pct = Math.min(90, 20 + (elapsed / 120_000) * 70);
      const label =
        elapsed < 35_000 ? "📡 Pharma-Quellen werden abgerufen…" :
        elapsed < 80_000 ? "🤖 Briefing wird mit Claude generiert…" :
                           "💾 Briefing wird gespeichert & gepusht…";
      setProgress(pct, label);
    } else if (run.status === "completed") {
      clearRun();
      if (run.conclusion === "success") {
        setProgress(100, "✅ Fertig! Seite wird neu geladen…", "done");
        await sleep(1800);
        window.location.reload();
        return;
      } else {
        throw new Error("Fehlgeschlagen: " + run.conclusion);
      }
    }
    await sleep(8000);
  }
}

async function triggerRebuild() {
  const token = new URLSearchParams(window.location.hash.slice(1)).get("token");
  if (!token) {
    alert("Kein Token in der URL gefunden.\n\nBitte die Seite mit #token=DEIN_TOKEN aufrufen.");
    return;
  }
  setBusy();
  setProgress(5, "Verbindung zu GitHub…");
  const headers = makeHeaders(token);

  try {
    const res = await fetch(
      `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches`,
      { method: "POST", headers, body: JSON.stringify({ ref: "main" }) }
    );
    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      throw new Error(j.message || "HTTP " + res.status);
    }

    // Save timestamp IMMEDIATELY after confirmed dispatch — before any run search —
    // so a page reload at any point can still resume.
    const dispatchTime = Date.now();
    saveDispatch(dispatchTime);
    setProgress(10, "Workflow ausgelöst – suche Run…");
    await sleep(5000);

    const run = await findRun(dispatchTime, headers);
    if (!run) throw new Error("Kein Workflow-Run gefunden");

    setProgress(20, "Workflow gestartet");
    await pollUntilDone(run.id, dispatchTime, headers);
  } catch (err) {
    clearRun();
    setProgress(100, "✗ " + err.message, "fail");
    await sleep(3000);
    resetBtn();
  }
}

// On every page load: if a dispatch timestamp is saved, find and resume the run.
(async function resumeIfActive() {
  const dispatchTime = loadDispatch();
  if (!dispatchTime) return;
  const token = new URLSearchParams(window.location.hash.slice(1)).get("token");
  if (!token) { clearRun(); return; }

  setBusy();
  const elapsed = Date.now() - dispatchTime;
  setProgress(Math.min(85, 10 + (elapsed / 120_000) * 75), "Verbinde mit laufendem Workflow…");
  const headers = makeHeaders(token);

  try {
    const run = await findRun(dispatchTime, headers);
    if (!run) {
      // Not found: run likely completed before this reload and the tab was closed
      // (clearRun was never called). Reset cleanly.
      clearRun();
      resetBtn();
      return;
    }
    // If already completed, pollUntilDone handles it immediately (success → reload, else error)
    await pollUntilDone(run.id, dispatchTime, headers);
  } catch (err) {
    clearRun();
    setProgress(100, "✗ " + err.message, "fail");
    await sleep(3000);
    resetBtn();
  }
})();
</script>

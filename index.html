    "html": "<h1>Pharma-Briefing – 08. Mai 2026</h1>\n\n<hr>\n\n<h2>Einleitung</h2>\n\n<p>Der heutige Tag steht im Zeichen wegweisender klinischer Daten aus der Schlaganfall- und Onkologieforschung sowie strategischer Bewegungen im Pharmamarkt – allen voran der milliardenschwere US-Expansion von Angelini und das starke Debüt von Novo Nordisks oraler Semaglutid-Formulierung. Auf regulatorischer Seite sorgt die FDA mit mehreren ungewöhnlichen Entscheidungen für Gesprächsstoff, die das Vertrauen in Zulassungsprozesse und Kommunikationsstandards berühren.</p>\n\n<hr>\n\n<h2>🏭 Pharma-Industrie</h2>\n\n<ul>\n  <li><strong>Angelini übernimmt Catalyst Biosciences für 4,1 Mrd. USD:</strong> Das italienische Pharmaunternehmen setzt damit ein klares Signal für seine US-Wachsamkeitsstrategie. Die Transaktion unterstreicht den anhaltenden Konsolidierungsdruck im Markt – insbesondere für mittelgroße Unternehmen, die in der Neurologie und Psychiatrie aktiv sind, zwei Kernbereiche von Angelini.</li>\n</ul>\n\n<ul>\n  <li><strong>Novo Nordisks oraler Wegovy (Semaglutid-Tablette) erzielt 355 Mio. USD im Erstquartal:</strong> CEO Lars Fruergaard Jørgensen spricht von einem Preis-„Sweet Spot\", der Accessibilität und Margenerwartungen balanciert. Für Industrieapotheker relevant: Die orale Bioverfügbarkeit von GLP-1-Agonisten gilt nach wie vor als formulierungstechnische Herausforderung – der kommerzielle Erfolg bestätigt, dass diese überwunden ist.</li>\n</ul>\n\n<ul>\n  <li><strong>FDA überdenkt die Ablehnung der Zelltherapie Ebvallo (Tabelecleucel):</strong> Die überraschende Ablehnung der EBV-spezifischen T-Zell-Therapie war ein Rückschlag für den Hersteller Pierre Fabre. Die FDA-Bereitschaft zur Neuprüfung ist ein positives Signal für die Zelltherapie-Pipeline insgesamt – und könnte präzedenzwirksam für uniQure und andere sein.</li>\n</ul>\n\n<ul>\n  <li><strong>FDA rügt Alnylam wegen Wirksamkeitsbehauptungen auf der Amvuttra-Website:</strong> Die FDA kritisierte irreführende Effektivitätsangaben für den RNAi-Wirkstoff Vutrisiran (ATTR-Amyloidose). Für Regulatory-Affairs-Teams ein Warnsignal: Auch digitale Kommunikationskanäle unterliegen strenger Werbeaufsicht – Compliance-Überprüfungen von Online-Inhalten sind essenziell.</li>\n</ul>\n\n<ul>\n  <li><strong>FDA blockiert Veröffentlichung von Sicherheitsstudien zu COVID- und Gürtelrose-Impfstoffen (NYT):</strong> Laut <em>New York Times</em> verhindert die FDA die Publikation behördlich beauftragter Sicherheitsanalysen. Dies ist im Kontext der aktuellen politischen Einflussnahme auf US-Gesundheitsbehörden besorgniserregend und könnte das internationale Vertrauen in regulatorische Transparenz beschädigen – ein Thema, das auch für EMA und AGES relevant ist.</li>\n</ul>\n\n<hr>\n\n<h2>🔬 Klinische Forschung</h2>\n\n<ul>\n  <li><strong>TAPIS-Studie (Lancet): Duale Thrombozytenhemmung plus Thrombolyse beim ischämischen Schlaganfall:</strong> Die randomisierte, doppelblinde chinesische Multicenterstudie zeigt positive Ergebnisse für Ticagrelor plus Aspirin in Kombination mit intravenöser Thrombolyse bei einem definierten Schlaganfallphänotyp. Die begleitenden Kommentare betonen die Relevanz der Patientenselektion – ein wichtiges Signal für zukünftige Leitlinienentwicklungen in der Schlaganfalltherapie.</li>\n</ul>\n\n<ul>\n  <li><strong>ATLAS-Metaanalyse (Lancet): Thrombektomie bis 24 h nach Schlaganfall auch bei großem Infarkt-Core wirksam:</strong> Die individuelle Patientendaten-Metaanalyse bestätigt den Nutzen der endovaskulären Thrombektomie auch bei ausgedehnten Infarkten (niedrige ASPECTS-Scores) bis zu 24 Stunden nach Symptombeginn. Dies erweitert das therapeutische Fenster erheblich und hat direkte Implikationen für die Schlaganfallversorgung und Arzneimittelkombinationstherapien im periinterventionellen Setting.</li>\n</ul>\n\n<ul>\n  <li><strong>Daraxonrasib bei vorbehandeltem RAS-mutiertem Pankreaskarzinom (NEJM):</strong> Daten zum ersten oral verfügbaren KRAS-Inhibitor in dieser Indikation werden im NEJM publiziert. Pancreaskarzinom mit RAS-Mutation gilt als therapeutisch besonders schwer zugänglich – positive Wirksamkeitssignale wären ein bedeutsamer Fortschritt in der Onkologie.</li>\n</ul>\n\n<ul>\n  <li><strong>mRNA-Influenza-Impfstoff: Wirksamkeit und Sicherheit in Erwachsenen (NEJM):</strong> Die Publikation liefert erstmals robuste klinische Phase-III-Daten für einen saisonalen mRNA-Grippe-Impfstoff. Angesichts der etablierten mRNA-Plattform nach COVID-19 ist dies ein strategisch relevanter Datenpunkt für Impfstoffhersteller und den Markt für saisonale Impfungen.</li>\n</ul>\n\n<ul>\n  <li><strong>Base Editing bei Sichelzellkrankheit – Editierung der HBG1/HBG2-Promotoren (NEJM):</strong> Der Ansatz zur Reaktivierung fötalen Hämoglobins via Basenpaar-Editierung zeigt die fortschreitende Reife von Gen-Editing-Technologien jenseits von CRISPR-Cas9. Sicherheits- und Effizienzprofile dieser Methode sind für die weitere klinische Entwicklung entscheidend – die NEJM-Publikation dürfte ein Meilenstein in der Gentherapie der Hämoglobinopathien sein.</li>\n</ul>\n\n<hr>\n\n<h2>⚠️ Regulatorisches</h2>\n\n<p><em>Für den 08.05.2026 liegen keine eigenständigen regulatorischen Meldungen vor.</em> Dennoch ergeben sich aus der Industrieberichterstattung regulatorisch relevante Signale:</p>\n\n<ul>\n  <li>Die <strong>FDA-Kritik an Alnylams Amvuttra-Website</strong> verdeutlicht, dass digitale Werbung konsequent auf Compliance zu prüfen ist.</li>\n  <li>Die <strong>geplante Neuprüfung von Ebvallo</strong> zeigt, dass unerwartete FDA-Ablehnungen nicht zwingend endgültig sind – Unternehmen sollten Eskalationspfade kennen und nutzen.</li>\n  <li>Das <strong>Blockieren von Impfstoff-Sicherheitsstudien</strong> durch die FDA ist ein regulatorisches Governance-Thema, das international beobachtet werden sollte.</li>\n</ul>\n\n<hr>\n\n<h2>📅 Ausblick</h2>\n\n<p>Die vollständigen Studiendaten zu Daraxonrasib und dem mRNA-Influenza-Impfstoff aus dem aktuellen NEJM-Heft sollten in den kommenden Tagen genau analysiert werden – beide Projekte haben das Potenzial, bestehende Therapiestandards zu verschieben. Parallel bleibt die Entwicklung rund um die FDA-Governance-Krise im Blick zu behalten: Sollten weitere Fälle von zurückgehaltenen Sicherheitsdaten bekannt werden, könnte dies internationale Regulierungsdiskussionen – auch auf EMA-Ebene –</p><details class=\"src-details\"><summary class=\"src-summary\"><span class=\"src-arrow\">▶</span>📰 Quellen &amp; Schlagzeilen (30 Artikel)</summary><div class=\"src-body\"><div class=\"src-category\"><div class=\"src-category-name\">Pharma-Industrie</div><div class=\"src-source\"><div class=\"src-source-name\">Fierce Pharma</div><div class=\"src-item\"><a href=\"https://www.fiercepharma.com/marketing/pre-launch-efforts-linked-lasting-drug-awareness-edge-report\" target=\"_blank\" class=\"src-link\">&lt;a href=\"https://www.fiercepharma.com/marketing/pre-launch-efforts-linked-lasting-drug-awareness-edge-report\" hreflang=\"en\"&gt;Pre-launch efforts linked to lasting drug awareness edge: report&lt;/a&gt;</a></div><div class=\"src-item\"><a href=\"https://www.fiercepharma.com/pharma/angelini-finds-catalyst-its-us-growth-ambitions-41b-buyout\" target=\"_blank\" class=\"src-link\">&lt;a href=\"https://www.fiercepharma.com/pharma/angelini-finds-catalyst-its-us-growth-ambitions-41b-buyout\" hreflang=\"en\"&gt;Angelini finds Catalyst for its US growth ambitions with $4.1B buyout&lt;/a&gt;</a></div><div class=\"src-item\"><a href=\"https://www.fiercepharma.com/manufacturing/timing-right-psychedelics-manufacturer-optimi-health\" target=\"_blank\" class=\"src-link\">&lt;a href=\"https://www.fiercepharma.com/manufacturing/timing-right-psychedelics-manufacturer-optimi-health\" hreflang=\"en\"&gt;The timing is right for psychedelics manufacturer Optimi Health's IPO&lt;/a&gt;</a></div><div class=\"src-item\"><a href=\"https://www.fiercepharma.com/pharma/fda-reconsider-surprisingly-rejected-cell-therapy-ebval const today = new Date().toISOString().slice(0, 10);
const nav = document.getElementById("nav");
const content = document.getElementById("content");

document.getElementById("count-label").textContent =
  briefings.length + " Ausgabe" + (briefings.length !== 1 ? "n" : "");

briefings.forEach((b, i) => {
  const item = document.createElement("div");
  item.className = "nav-item";
  item.dataset.id = b.id;
  const isToday = b.date === today;
  item.innerHTML = `
    <div class="nav-date">
      <div class="nav-weekday">${b.weekday}</div>
      <div class="nav-datestr">${b.date_display}</div>
    </div>
    ${isToday ? '<span class="today-badge">Heute</span>' : ""}
  `;
  item.addEventListener("click", () => show(b.id));
  nav.appendChild(item);

  const panel = document.createElement("div");
  panel.className = "briefing";
  panel.id = "briefing-" + b.id;
  panel.innerHTML = `<div class="briefing-card">${b.html}</div>`;
  content.appendChild(panel);
});

function show(id) {
  document.querySelectorAll(".briefing").forEach(el => el.classList.remove("visible"));
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  document.getElementById("briefing-" + id)?.classList.add("visible");
  document.querySelector(`.nav-item[data-id="${id}"]`)?.classList.add("active");
  document.getElementById("main").scrollTo(0, 0);
}

if (briefings.length > 0) show(briefings[0].id);

function triggerRebuild() {
  const hash = window.location.hash.slice(1);
  const token = new URLSearchParams(hash).get("token");
  if (!token) {
    alert("Kein Token in der URL gefunden.\n\nBitte die Seite mit #token=DEIN_TOKEN aufrufen.");
    return;
  }
  const btn = document.getElementById("refresh-btn");
  const icon = document.getElementById("refresh-icon");
  const label = document.getElementById("refresh-label");
  btn.disabled = true;
  icon.textContent = "⏳";
  label.textContent = "Wird gestartet…";
  fetch("https://api.github.com/repos/amelgit/pharma-digest/actions/workflows/digest.yml/dispatches", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token,
      "Accept": "application/vnd.github+json",
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ ref: "main" }),
  })
  .then(r => {
    if (r.ok || r.status === 204) {
      btn.classList.add("success");
      icon.textContent = "✓";
      label.textContent = "Gestartet – in ~2 Min. neu laden";
      setTimeout(() => window.location.reload(), 150000);
    } else {
      return r.json().then(j => { throw new Error(j.message || r.status); });
    }
  })
  .catch(err => {
    btn.disabled = false;
    btn.classList.add("error");
    icon.textContent = "✗";
    label.textContent = "Fehler: " + err.message;
    setTimeout(() => {
      btn.classList.remove("error");
      icon.textContent = "🔄";
      label.textContent = "Neu generieren";
    }, 4000);
  });
}
</script>

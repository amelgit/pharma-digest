ss=\"mkt-pct mkt-pos mkt-day\">+0.06%</td><td class=\"mkt-range\"><div class=\"mkt-range-labels\"><span>$47.55</span><span>$64.36</span></div><div class=\"mkt-track\"><div class=\"mkt-dot\" style=\"left:18.0%\"></div></div></td><td class=\"mkt-pct mkt-pos \">+4.35%</td><td class=\"mkt-pct mkt-neg \">-4.60%</td><td class=\"mkt-pct mkt-neg \">-18.23%</td></tr></tbody></table><div class=\"mkt-analysis\"><div class=\"mkt-analysis-title\">🔍 Kursbewegungen &amp; Marktkontext</div><p>Kursanalyse im regulatorischen Kontext</p><p>Der Kursanstieg von Boston Scientific (+1,10 %) ist im gestrigen Briefing-Kontext gut begründbar, da die Veröffentlichung neuer positiver klinischer Daten zum IVL-Katheter als klassischer Kurstreiber wirkt – solche Pivotal-Daten stärken das Marktvertrauen in die Pipeline und die regulatorische Positionierung des Unternehmens. Der leichte Zuwachs bei BD/C.R. Bard (+0,94 %) und Teleflex (+0,90 %) ist hingegen weniger klar durch gestrige Ereignisse erklärbar, könnte aber auf eine generelle Sektordrehung in Richtung etablierter urologischer Gerätehersteller hindeuten, nachdem das Briefing keine negativen Vigilanzmeldungen oder FSCA-Ereignisse für diese Wettbewerber verzeichnete. Der Rückgang bei Coloplast (-2,46 %) ist angesichts des Briefings zwar nicht direkt kausal erklärbar – da keine Rückruf- oder Vigilanzmeldung für das Unternehmen gemeldet wurde –, erscheint jedoch im Kontext des wachsenden Wettbewerbsdrucks durch neue CE-zugelassene Systeme (Sentante-Robotik) und die TITAN-2-Daten zu implantierbaren Neuromodulationssystemen kontraintuitiv belastet, da Coloplast im Inkontinenz- und Ostomiebereich direkt von State-of-the-Art-Verschiebungen betroffen sein kann. Die nahezu unveränderten Werte bei Siemens Healthineers (-0,03 %) und dem iShares MedTech ETF (+0,06 %) spiegeln die im Briefing beschriebene regulatorische Ruhephase ohne MDCG-Leitlinien oder EUDAMED-Meldungen wider, die typischerweise keine starken Sektorbewegungen auslöst. Insgesamt sind die Kursbewegungen im Sektor moderat und konsistent mit einem Nachrichtentag, der zwar klinische Evidenz, aber keine disruptiven regulatorischen Ereignisse wie MDR-Zulassungsentscheidungen, FDA-Warnbriefe oder breite FSCA-Wellen hervorgebracht hat.</p></div></div>\n\n<h1>Regulatory Affairs Briefing – Medizinprodukte & Urologie</h1>\n<p><strong>Farco Pharma GmbH | 24. Mai 2026</strong></p>\n\n<hr>\n\n<h2>Einleitung</h2>\n\n<p>Der heutige Briefing-Tag ist regulatorisch ruhig – weder neue MDR/IVDR-Guidance noch Vigilanz-Ereignisse sind verfügbar. Im Fokus stehen dennoch relevante Industrie- und klinische Entwicklungen: Mehrere MedTech-Konzerne treiben strategische Repositionierungen voran, während neue klinische Daten aus der Urologie – insbesondere zu Neuromodulation, TURBT und Blasendysfunktion – regulatorische Implikationen für PMCF-Strategien und klinische Bewertungen haben können.</p>\n\n<hr>\n\n<h2>1. MDR & Regulatorik</h2>\n\n<p>> <em>Keine regulatorischen Schlagzeilen verfügbar (MDCG, Kommission, Benannte Stellen, EUDAMED).</em></p>\n\n<ul>\n  <li>Es liegen heute keine neuen MDCG-Leitlinien, Durchführungsrechtsakte oder Bekanntmachungen der Europäischen Kommission zu MDR/IVDR vor.</li>\n  <li>Kein Update zu EUDAMED-Ausbauphasen oder UDI-Fristen verfügbar.</li>\n  <li><strong>Empfehlung:</strong> Status der laufenden MDCG-Arbeitsprogramme und offener Konsultationen (z. B. zu Annex I „Common Specifications\", klinischer Bewertung von Klasse IIa/IIb-Produkten) regelmäßig auf dem offiziellen MDCG-Portal prüfen.</li>\n</ul>\n\n<hr>\n\n<h2>2. Vigilanz & Sicherheit</h2>\n\n<p>> <em>Keine Vigilanz-Schlagzeilen verfügbar (FSCAs, Rückrufe, Sicherheitshinweise).</em></p>\n\n<ul>\n  <li>Keine FSCAs (Field Safety Corrective Actions), Rückrufe oder behördlichen Sicherheitsmitteilungen für urologische Produkte oder Wettbewerber gemeldet.</li>\n  <li>Keine neuen Einträge bei BfArM, MHRA, FDA MedWatch oder EUDAMED-Surveillance erkennbar.</li>\n  <li><strong>Empfehlung:</strong> PMS-Routine und Trendanalysen laufen lassen; EUDAMED-Vigilanzmodul sowie BfArM-Datenbank für urologische Katheter und Inkontinenzprodukte weiterhin im Monitoring halten.</li>\n</ul>\n\n<hr>\n\n<h2>3. MedTech-Industrie</h2>\n\n<ul>\n  <li><strong>Medtronic etabliert European Software Hub in Irland:</strong> Strategische Verlagerung von Software-Kompetenzen nach Europa signalisiert erhöhten Fokus auf EU-konforme SaMD-Entwicklung (MDR Artikel 2(1), Anhang I GSPR für Software). Implikation: Beschleunigung von CE-Marking-Prozessen für Medtronic-SaMD in der EU möglich. <strong>[Wettbewerb]</strong></li>\n</ul>\n\n<ul>\n  <li><strong>Sentante erhält CE-Kennzeichnung für endovaskulären Roboter (Europe):</strong> Markteintritt eines neuen Akteurs im Bereich robotischer Interventionssysteme unter MDR. Für Farco unmittelbar nicht relevant, zeigt aber den Trend zur CE-Zertifizierung hochkomplexer aktiver Implantate (Klasse III, MDR Art. 51) unter gesteigertem Benannte-Stelle-Druck. <strong>[Wettbewerb]</strong></li>\n</ul>\n\n<ul>\n  <li><strong>Medtronic übernimmt SPR Therapeutics (~650 Mio. USD):</strong> SPR Therapeutics entwickelt periphere Neurostimulationssysteme (u. a. SPRINT® PNS). Konsolidierung im Neuromodulationsbereich ist direkt relevant für <strong>[Urologie]</strong>: Medtronic stärkt sein Portfolio in der sakralen/peripheren Neuromodulation, einem direkten Wettbewerbsbereich zu tibialem Neuromodulation-Systemen (vgl. TITAN-2-Studie, siehe Kategorie 4). <strong>[Wettbewerb]</strong></li>\n</ul>\n\n<ul>\n  <li><strong>Boston Scientific veröffentlicht positive Daten für koronaren IVL-Katheter:</strong> Für Farco keine direkte Relevanz; zeigt jedoch, dass Boston Scientific – auch im urologischen Segment aktiv – kontinuierlich klinische Evidenz für Katheterprodukte aufbaut. PMCF-Daten aus Nachbarbereichen können Benchmarks für klinische Bewertungen setzen. <strong>[Wettbewerb]</strong></li>\n</ul>\n\n<ul>\n  <li><strong>Intuitive bereitet 100 Updates für da Vinci 5 vor:</strong> Massive Post-Market-Änderungsnotifikation für ein Klasse IIb/III-Chirurgiesystem. Regulatorisch relevant als Beispiel für Article-97-MDR-konforme Änderungssteuerung und Substantial-Change-Assessment. Für Regulatory Affairs als Präzedenz im Umgang mit umfangreichen Produktmodifikationen unter MDR zu beobachten.</li>\n</ul>\n\n<hr>\n\n<h2>4. Urologie & Klinische Evidenz</h2>\n\n<ul>\n  <li><strong>TITAN-2 Pivotal Study – Implantierbare tibiale Neuromodulation bei Urge-Inkontinenz:</strong> Positive Studiendaten für ein implantierbares tibiales Neuromodulationssystem. <strong>[Urologie]</strong> Regulatorisch: Solche Pivotstudien bilden die klinische Evidenzbasis für CERs und PMCF-Pläne (MDR Anhang XIV, Teil A/B). Für Farco: Marktbeobachtung im Bereich OAB-/Inkontinenztherapie und Abgrenzung eigener Produktprofile erforderlich.</li>\n</ul>\n\n<ul>\n  <li><strong>EMBRACE-RCT: ERAS-Protokoll bei ambulantem TURBT:</strong> Randomisiert-kontrollierte Studie zu Enhanced Recovery After Surgery bei TURBT zeigt Verbesserungen in Patientenoutcomes. <strong>[Urologie]</strong> Klinische Relevanz: Endoskopische Systeme (Katheter, Spülsysteme, Zubehör) im perioperativen Einsatz können durch ERAS-Daten als klinischer State-of-the-Art im Sinne von MDR Anhang I, §1 (GSPR) neu definiert werden – relevant für CER-Updates.</li>\n</ul>\n\n<ul>\n  <li><strong>Intravesikale Botulinumtoxin-Injektion bei pädiatrischen Patienten mit neurogener Blase:</strong> Machbarkeitsstudie belegt Ambulanz-Tauglichkeit. <strong>[Urologie]</strong> Implikation: Applikationssysteme für intravesikale Therapie (Kombinationsprodukt-Schnittstelle, MDR Art. 1(8)/(9)) gewinnen an klinischer Bedeutung. Für Farco relevant, sofern Applikationshilfen oder Katheter-Kombinationen im Portfolio oder in Entwicklung.</li>\n</ul>\n\n<ul>\n  <li><strong>Ureteral Dilatation als Risikofaktor für HWI bei Kindern mit pränataler Hydronephrose:</strong> Klinisch-epidemiologische Studie fordert Überarbeitung von Leitlinien. <strong>[Urologie]</strong> Für Regulatory Affairs: Geänderte klinische Praxis kann Intended-Use-Definitionen und Indikationsfelder für urologische Drainagesysteme und Katheter tangieren – CER-Abschnitte zu klinischem Hintergrund (State of the Art) entsprechend im Blick behalten.</li>\n</ul>\n\n<ul>\n  <li><strong>Low Testosterone & Prostatakarzinom-Progression unter Active Surveillance:</strong> Retrospektive Kohortenstudie zeigt Assoziation zwischen niedrigem Testosteron und Grading-Progression. <strong>[Urologie]</strong> Indirekte Relevanz für Farco-Produktportfolio im BPH/Prostata-Bereich: Veränderte klinische Leitlinien können Diagnosepfade und damit Einsatzkontexte verbundener Medizinprodukte verschieben.</li>\n</ul>\n\n<hr>\n\n<h2>Ausblick</h2>\n\n<p>Regulatory Affairs bei Farco sollte die Konsolidierungsbewegung im Neuromodulationsbereich (Medtronic/SPR Therapeutics) strategisch verfolgen und prüfen, ob PMCF-Designs im OAB-/Inkontinenzportfolio mit den neuen klinischen Evidenzstandards (TITAN-2) Schritt halten. Zudem empfiehlt sich eine vorausschauende CER-Review für urologische Endoskopie- und Kathetersysteme im Licht der neuen ERAS/TURBT-Daten als sich entwickelndem State of the Art.</p>\n\n<hr>\n\n<p><em>Quellen: MedTech Dive, Journal of Urology (AUA) – Stand 24.05.2026 | Erstellt für Farco Pharma GmbH / MCM Klosterfrau-Gruppe</em></p><details class=\"src-details\"><summary class=\"src-summary\"><span class=\"src-arrow\">▶</span>📰 Quellen &amp; Schlagzeilen (20 Artikel)</summary><div class=\"src-body\"><div class=\"src-category\"><div class=\"src-category-name\">MedTech-Industrie</div><div class=\"src-source\"><div class=\"src-source-name\">MedTech Dive</div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/medtronic-to-create-european-software-hub-in-ireland/820999/\" target=\"_blank\" class=\"src-link\">Medtronic to create European software hub in Ireland</a><span class=\"src-date\">22.05.2026, 14:58</span></div><div class=\"src ss=\"mkt-pct mkt-pos mkt-day\">+0.06%</td><td class=\"mkt-range\"><div class=\"mkt-range-labels\"><span>$47.55</span><span>$64.36</span></div><div class=\"mkt-track\"><div class=\"mkt-dot\" style=\"left:18.0%\"></div></div></td><td class=\"mkt-pct mkt-pos \">+4.35%</td><td class=\"mkt-pct mkt-neg \">-4.60%</td><td class=\"mkt-pct mkt-neg \">-18.23%</td></tr></tbody></table><div class=\"mkt-analysis\"><div class=\"mkt-analysis-title\">🔍 Kursbewegungen &amp; Marktkontext</div><p>Kursanalyse: MedTech-Bewegungen im Regulatorik-Kontext</p><p>Der leichte Kursanstieg von Boston Scientific (+1,10 %) ist im Kontext der gestrigen positiven klinischen Daten zum koronaren IVL-Katheter plausibel, da starke Post-Market-Evidenz das Marktvertrauen in die Produktpipeline des Unternehmens stärkt. Der moderate Anstieg von Teleflex (+0,90 %) und BD/C.R. Bard (+0,94 %) könnte das allgemein positive Sentiment für Katheter- und Urologiespezialisten widerspiegeln, das durch die im Briefing dokumentierten PMCF-relevanten Studienergebnisse (TITAN 2, EMBRACE RCT) indirekt gestützt wird. Der Rückgang von Coloplast (-2,46 %) ist im vorliegenden Nachrichtenkontext hingegen überraschend und kontraintuitiv, da Coloplast als führender Anbieter im Inkontinenz- und Stomapflegebereich eigentlich von den positiven Neuromodulationsdaten und dem wachsenden OAB/Inkontinenz-Markt hätte profitieren können – der Kursrückgang lässt daher auf unternehmensspezifische oder makroökonomische Faktoren außerhalb des gestrigen Briefings schließen. Die Quasi-Stagnation von Siemens Healthineers (-0,03 %) und dem iShares MedTech ETF (+0,06 %) spiegelt die im Briefing beschriebene regulatorische Ruhe auf EU-Ebene wider – ohne neue MDCG-Leitlinien oder FSCA-Meldungen fehlen kurstreibende Katalysatoren für den Gesamtsektor. Insgesamt zeigt die Analyse, dass die Kursbewegungen nur partiell durch die gestrigen Regulatorik- und Industrienachrichten erklärbar sind, was unterstreicht, dass sektorspezifische Briefings allein keine hinreichende Grundlage für die Interpretation kurzfristiger Marktbewegungen darstellen.</p></div></div>\n\n<h1>Regulatory Affairs Briefing – Medizinprodukte & Urologie</h1>\n<p><strong>Farco Pharma GmbH | 23. Mai 2026</strong></p>\n\n<hr>\n\n<h2>Einleitung</h2>\n\n<p>Der heutige Tag ist regulatorisch durch Aktivitäten in der MedTech-Industrie geprägt, während dedizierte MDR/IVDR-Meldungen und Vigilanzmitteilungen ausbleiben – ein Ruhezustand, der erfahrungsgemäß keine regulatorische Entwarnung bedeutet, sondern aktive PMS-Prozesse unverändert erfordert. Im urologischen Bereich liefern neue klinische Studiendaten zu implantierbaren Neuromodulationssystemen und Blasenkrebsversorgung relevante Benchmarks für die klinische Bewertung (CER) und PMCF-Planung. Für Farco besonders beachtenswert sind Entwicklungen rund um Endovaskulärrobotik, IVL-Katheter sowie implantierbare Urologie-Devices.</p>\n\n<hr>\n\n<h2>1. MDR & Regulatorik</h2>\n\n<p>> <em>Keine Schlagzeilen verfügbar.</em></p>\n\n<ul>\n  <li><strong>Kein regulatorisches Tagesgeschäft gemeldet</strong> – weder neue MDCG-Leitlinien noch Anpassungen des EUDAMED-Rollouts oder MDR-Übergangsfristenregelungen. Interne Compliance-Aktivitäten (UDI-Registrierung, technische Dokumentation, Annex II/III-Pflege) laufen regulär weiter.</li>\n  <li><strong>Empfehlung:</strong> Offene Benannte-Stellen-Korrespondenzen und laufende Conformity Assessment-Verfahren sollten ungeachtet der Nachrichtenlage auf Fristenkontrolle geprüft werden – insbesondere für Produkte in der Klasse IIb/III (z. B. urologische Katheter mit Medikamentenbeschichtung gemäß MDR Art. 1(8)).</li>\n  <li><strong>EUDAMED-Status im Blick behalten:</strong> Die Pflicht zur vollständigen Nutzung zentraler EUDAMED-Module (UDI, Registration) tritt schrittweise in Kraft; fehlende Registrierungen können Marktfähigkeit gefährden.</li>\n</ul>\n\n<hr>\n\n<h2>2. Vigilanz & Sicherheit</h2>\n\n<p>> <em>Keine Schlagzeilen verfügbar.</em></p>\n\n<ul>\n  <li><strong>Keine FSCAs oder Rückrufe gemeldet</strong> – weder für urologische noch für sonstige Medizinprodukte. Aufmerksamkeit bleibt geboten, da FSCA-Meldungen mit Verzögerung in öffentlichen Kanälen erscheinen.</li>\n  <li><strong>Interne PMS-Prozesse</strong> gemäß MDR Annex III und Art. 87–92 sind unabhängig von Pressemeldungen kontinuierlich zu betreiben. Vigilanz-Signale aus Literaturdatenbanken (z. B. die heute verfügbaren Journal-of-Urology-Daten zu Harnwegsinfektionen bei Kindern, s. Abschnitt 4) sollten in die PMS-Dokumentation einfließen.</li>\n  <li><strong>Empfehlung:</strong> Wettbewerber-Vigilanzmeldungen bei Coloplast, B. Braun, Hollister und Teleflex (urologische Katheter, Inkontinenzprodukte) regelmäßig über BfArM-Datenbank und EUDAMED aktiv monitoren – auch bei fehlendem Nachrichtenfeed.</li>\n</ul>\n\n<hr>\n\n<h2>3. MedTech-Industrie</h2>\n\n<ul>\n  <li><strong>Medtronic: Strategische Expansion & M&A</strong> – Medtronic kündigt ein europäisches Software-Hub in Irland an und übernimmt SPR Therapeutics (Schmerztherapie mittels peripherer Nervenstimulation) für ~650 Mio. USD. Dies unterstreicht den Trend zu softwaregetriebenen Devices (SaMD) und neuromodulatorischen Therapien – für Regulatory Affairs relevant hinsichtlich MDR-konformer SaMD-Klassifizierung (Rule 11, MDR Annex VIII) und PMS-Anforderungen für aktive implantierbare Devices (Klasse III).</li>\n</ul>\n\n<ul>\n  <li><strong>[Wettbewerb] Boston Scientific: Positiv-Daten für koronaren IVL-Katheter</strong> – Boston Scientific veröffentlicht neue klinische Daten für seinen Intravascular Lithotripsy (IVL)-Katheter im koronaren Bereich. Technologisch verwandt mit uroskopischen Lithotripsie-Systemen; <strong>[Urologie]</strong> Entwicklungen in der IVL-Technologie sind für Harnsteinbehandlung und endourologische Instrumente strategisch zu beobachten. CER-Aktualisierungen für vergleichbare urologische Energiegeräte sollten diese State-of-the-Art-Daten berücksichtigen (MDR Annex XIV, MDCG 2020-13).</li>\n</ul>\n\n<ul>\n  <li><strong>Sentante erhält CE-Kennzeichnung für endovaskulären Roboter</strong> – Ein weiteres CE-zugelassenes Robotik-System betritt den europäischen Markt (Klasse IIb/III, aktives therapeutisches Gerät). Dies verdeutlicht den wachsenden Prüfdruck auf Benannte Stellen und die steigende Bedeutanz klinischer Evidenz bei innovativen Devices. <strong>[Urologie]</strong> Robotik-Plattformen dringen zunehmend in die Uroskopie vor (vgl. Karl Storz, Intuitive); Farco sollte Marktentwicklungen in der robotischen Zystoskopie/Nephroskopie im Competitive Intelligence-Prozess verankern.</li>\n</ul>\n\n<ul>\n  <li><strong>Intuitive Surgical: 100 Updates für da Vinci 5</strong> – Die Ankündigung massiver Software- und Hardware-Updates für eine bereits zugelassene Plattform wirft regulatorisch die Frage nach Post-Market Modifications auf: Unter MDR Art. 120(3) und MDCG 2020-3 sind wesentliche Änderungen an bestehenden Devices meldepflichtig und können neue Conformity Assessments erfordern. Dieser Fall ist ein Benchmark für das interne Change-Management-Verfahren bei Farco.</li>\n</ul>\n\n<ul>\n  <li><strong>Medtronic & BD: Neue Führungspersonen</strong> – Führungswechsel bei zwei Großanbietern (Medtronic, BD/C.R. Bard) können mittelfristig strategische Prioritäten bei Regulatory Affairs und Marktverhalten beeinflussen. <strong>[Wettbewerb]</strong> BD/C.R. Bard ist direkter Wettbewerber im urologischen Kathetermarkt; Personalwechsel im Führungsbereich sind für Competitive-Intelligence-Monitoring relevant.</li>\n</ul>\n\n<hr>\n\n<h2>4. Urologie & Klinische Evidenz</h2>\n\n<ul>\n  <li><strong>[Urologie] TITAN 2 Pivotal Study – Implantierbare Tibiale Neuromodulation bei Dranginkontinenz</strong> – Die publizierten Ergebnisse der TITAN-2-Studie belegen die Wirksamkeit implantierbarer tibialer Neuromodulationstherapie bei Urge Urinary Incontinence (UUI). Regulatorisch relevant: Solche Pivotal-Daten definieren den State of the Art für CER/PMCF-Anforderungen bei konkurrierenden Inkontinenzprodukten (MDR Annex XIV Pt. A, MDCG 2020-13). Für Farcos Produktportfolio im Bereich Inkontinenz sind diese Daten in den nächsten CER-Update-Zyklus zu integrieren.</li>\n</ul>\n\n<ul>\n  <li><strong>[Urologie] Intravesikale Botulinumtoxin-Injektion bei pädiatrischen neurogenen Blasen (ambulant)</strong> – Die Studie belegt Durchführbarkeit und Tolerabilität ambulanter intravesikaler BTX-Injektionen bei Kindern. <strong>Regulatorische Implikation:</strong> Botulinumtoxin ist ein Arzneimittel; Kombinationsprodukte aus Katheter/Injektionssystem + Wirkstoff können unter MDR Art. 1(8)/(9) fallen. Farco sollte prüfen, ob eigene oder in Entwicklung befindliche Applikationssysteme für intravesikale Therapien als Drug-Device Combination einzustufen sind, was eine Konsultation der zuständigen Arzneimittelbehörde erfordert.</li>\n</ul>\n\n<ul>\n  <li><strong>[Urologie] EMBRACE RCT – ERAS-Protokoll bei ambulanter TURBT</strong> – Die randomisierte EMBRACE-Studie zeigt Vorteile eines Enhanced Recovery After Surgery (ERAS)-Protokolls bei ambulanter transurethraler Blasentumorresektion. Für Hersteller von TURBT-Instrumentarium (Resektoskope, Einwegkomponenten) sind diese Daten State-of-the-Art-relevant; <strong>[Wettbewerb]</strong> Karl Storz und Olympus dominieren dieses Segment. Farco sollte ERAS-konforme Produktpositionierungen im Bereich Uroskopie-Zubehör evaluieren.</li>\n</ul>\n\n<ul>\n  <li><strong>[Urologie] Harnwegsinfektion-Risiko bei Kindern mit pränataler Hydronephrose und Ureterdilatation</strong> – Die Studie identifiziert Ureterdilatation als signifikanten klinischen Risikofaktor für HWI-Komplikationen bei Kindern. <strong>Regulatorische Implikation:</strong> Für urologische Katheter und Drainage-Produkte, die in dieser Patientenpopulation eingesetzt werden, sind diese Real-World-Daten als Post-Market-Evidenz (MDR Art. 61(1), Annex XIV) und für die Aktualisierung des klinischen Nutzens in der CER nutzbar. Insbesondere die Benefit-Risk-Bewertung für pädiatrische Indikationen ist zu prüfen.</li>\n</ul>\n\n<ul>\n  <li><strong>[Urologie] Androgen-Adequacy-Framework & Prostatakrebs-Progression unter Active Surveillance</strong> – Zwei Publikationen liefern neue Evidenz zur Rolle von Testosteron bei Prostatakarzinom-Progression. Für Farco mit Fokus auf BPH-Behandlung und urologische Pharmakotherapie: Diese Daten können für die klinische Bewertung von Kombinationsprodukten oder Geräten im BPH/PCa-Umfeld (z. B. Instillationssysteme, Drug-Delivery-Devices) als klinischer Kontext und State-of-the-Art-Nachweis in CER/PMCF-Berichten herangezogen werden.</li>\n</ul>\n\n<hr>\n\n<h2>Ausblick</h2>\n\n<p>Regulatory Affairs bei Farco sollte in den kommenden Wochen insbesondere die Veröffentlichung neuer MDCG-Leitlinien zu Drug-Device Combinations (MDR Art. 1(8)/(9)) sowie mögliche EUDAMED-Rollout-Updates im Blick behalten, da beide Themen das urologische Produktportfolio unmittelbar berühren. Darüber hinaus empfiehlt sich eine zeitnahe Bewertung der TITAN-2- und EMBRACE-Studiendaten im Hinblick auf anstehende CER-Updates.</p>\n\n<hr>\n\n<p><em>Erstellt am 23.05.2026 | Farco Pharma GmbH – Regulatory Affairs, Medical Devices & Quality</em></p>\n<p>*Quellen: MedTech Dive, Journal of</p><details class=\"src-details\"><summary class=\"src-summary\"><span class=\"src-arrow\">▶</span>📰 Quellen &amp; Schlagzeilen (20 Artikel)</summary><div class=\"src-body\"><div class=\"src-category\"><div class=\"src-category-name\">MedTech-Industrie</div><div class=\"src-source\"><div class=\"src-source-name\">MedTech Dive</div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/medtronic-to-create-european-software-hub-in-ireland/820999/\" target=\"_blank\" class=\"src-link\">Medtronic to create European software hub in Ireland</a><span class=\"src-date\">22.05.2026, 14:58</span></div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/intuitive-readies-100-updates-and-improvements-for-da-vinci-5/820951/\" target=\"_blank .15%</td><td class=\"mkt-range\"><div class=\"mkt-range-labels\"><span>$47.55</span><span>$64.36</span></div><div class=\"mkt-track\"><div class=\"mkt-dot\" style=\"left:18.3%\"></div></div></td><td class=\"mkt-pct mkt-pos \">+4.45%</td><td class=\"mkt-pct mkt-neg \">-4.52%</td><td class=\"mkt-pct mkt-neg \">-18.15%</td></tr></tbody></table><div class=\"mkt-analysis\"><div class=\"mkt-analysis-title\">🔍 Kursbewegungen &amp; Marktkontext</div><p>Analyse: Kursbewegungen im Kontext der gestrigen Nachrichten</p><p>Der leichte Kursanstieg von <strong>Boston Scientific (+1,01 %)</strong> ist gut nachvollziehbar: Positive IVL-Katheterdaten sowie die strategisch ambitionierte 1,5-Mrd.-USD-Investition in den TAVR-Entwickler MiRus signalisieren Wachstumsdynamik und dürften Investorvertrauen gestärkt haben. Der moderate Anstieg von <strong>Teleflex (+0,63 %)</strong> erscheint plausibel im Kontext der EMBRACE-ERAS-Daten zu ambulanten TURBT-Eingriffen, da Teleflex als Anbieter urologischer Einmalprodukte von einem steigenden Bedarf an einfach handhabbaren Kathetersystemen profitieren könnte. Der Kursrückgang von <strong>Coloplast (-2,46 %)</strong> ist die auffälligste Bewegung des Tages und wirkt auf den ersten Blick kontraintuitiv, da keine direkten negativen Nachrichten – weder Vigilanzmeldungen, FSCAs noch adverse MDR-Entscheidungen – für das Unternehmen vorlagen; möglich ist jedoch, dass die starken TITAN-2-Studiendaten zur implantierbaren tibialen Neuromodulation als Bedrohung für konservative Kontinenzprodukte, einem Kerngeschäft von Coloplast, gewertet wurden. <strong>BD (+0,02 %)</strong> und <strong>Siemens Healthineers (-0,03 %)</strong> bewegen sich nahezu unverändert, was konsistent mit dem regulatorisch ruhigen Umfeld ohne neue MDCG-Leitlinien, Notified-Body-Kommuniqués oder signifikante produktspezifische Nachrichten für diese Unternehmen ist. Der marginale Anstieg des <strong>iShares MedTech ETF (+0,15 %)</strong> spiegelt die leicht positive Gesamtstimmung im Sektor wider, die durch die BSc-Nachrichten und die Medtronic/SPR-Akquisition als Zeichen sektorweiter Investitionsbereitschaft getragen wird, ohne dass ein klarer regulatorischer Katalysator vorlag.</p></div></div>\n\n<h1>Regulatory Affairs Briefing – Medizinprodukte & Urologie</h1>\n<p><strong>Farco Pharma GmbH | 22. Mai 2026</strong></p>\n\n<hr>\n\n<h2>Einleitung</h2>\n\n<p>Der heutige Regulatoriktag zeigt sich im MDR/IVDR-Bereich ungewöhnlich ruhig – weder neue MDCG-Leitlinien noch Vigilanzmeldungen sind zu verzeichnen. Im Fokus stehen stattdessen industrielle Entwicklungen aus dem MedTech-Sektor sowie klinische Evidenz aus dem urologischen Fachbereich, die mittel- bis langfristig regulatorische Implikationen für PMCF-Planung, CER-Aktualisierungen und die klinische Neubewertung urologischer Produkte bei Farco haben können.</p>\n\n<hr>\n\n<h2>1. MDR & Regulatorik</h2>\n\n<p>> ⚠️ <em>Heute keine regulatorischen Neuigkeiten aus EU-Quellen (EMA, EUDAMED, MDCG, Kommission) verfügbar.</em></p>\n\n<p><strong>Regulatorische Implikation:</strong> Die Abwesenheit neuer Meldungen bietet einen geeigneten Anlass, interne Compliance-Aktivitäten voranzutreiben – insbesondere ausstehende PMS-Berichte, EUDAMED-Registrierungsschritte oder die Vorbereitung auf anstehende Benannte-Stelle-Audits.</p>\n\n<hr>\n\n<h2>2. Vigilanz & Sicherheit</h2>\n\n<p>> ⚠️ <em>Heute keine FSCA-Meldungen, Rückrufe oder Vigilanzmeldungen verfügbar.</em></p>\n\n<p><strong>Regulatorische Implikation:</strong> Kein unmittelbarer Handlungsbedarf. Gleichwohl sollte das interne Vigilanzsystem (MDR Art. 87–92, Anhang III) kontinuierlich auf eingehende Post-Market-Signale – insbesondere für Katheterprodukte und Drug-Device Combinations – überwacht werden.</p>\n\n<hr>\n\n<h2>3. MedTech-Industrie</h2>\n\n<ul>\n  <li><strong>Medtronic – Akquisition SPR Therapeutics (~650 Mio. USD):</strong> Medtronic übernimmt SPR Therapeutics, einen Spezialisten für periphere Nervenstimulation. Dies unterstreicht den anhaltenden Konsolidierungstrend bei Neuromodulationsplattformen – einem Bereich, der auch im urologischen Umfeld (sakrale/tibiale Neuromodulation bei OAB und Inkontinenz) an Relevanz gewinnt. <strong>[Urologie]</strong></li>\n</ul>\n\n<ul>\n  <li><strong>Sentante – CE-Kennzeichnung für endovaskulären Roboter:</strong> Das Unternehmen Sentante hat in Europa die CE-Kennzeichnung (vermutlich Klasse IIb/III nach MDR Anhang VIII, Regel 8/9) für ein endovaskuläres Robotersystem erhalten. Dies signalisiert, dass die Benannten Stellen weiterhin innovative, hochriskante Systeme unter MDR zertifizieren – mit entsprechend hohen Anforderungen an klinische Evidenz gemäß MDR Anhang XIV (CER/PMCF).</li>\n</ul>\n\n<ul>\n  <li><strong>Intuitive Surgical – 100 Updates für da Vinci 5:</strong> Intuitive kündigt 100 Verbesserungen für das da Vinci-5-System an. Unter MDR Art. 120(3) und dem Konzept der „erheblichen Änderung\" (MDCG 2020-3) können umfangreiche Software- und Hardware-Updates eine Neubewertung durch die Benannte Stelle auslösen. Dies ist ein praxisrelevantes Beispiel für das Change-Management bei komplexen aktiven Produkten. <strong>[Wettbewerb]</strong></li>\n</ul>\n\n<ul>\n  <li><strong>Medtronic – Europäischer Software-Hub in Irland:</strong> Medtronic investiert in eine europäische Softwareentwicklungskapazität, was im Kontext der MDR-Anforderungen an Software as a Medical Device (SaMD, MDR Art. 2 Nr. 1, MDCG 2019-11) und zunehmender KI-Regulierung (EU AI Act) strategische Bedeutung hat. Irland als EU-Mitgliedstaat ermöglicht direkten Marktzugang unter MDR. <strong>[Wettbewerb]</strong></li>\n</ul>\n\n<ul>\n  <li><strong>Boston Scientific – Positive Daten für koronaren IVL-Katheter:</strong> <strong>[Wettbewerb]</strong> Für Farco relevanter Kontext: Boston Scientific generiert aktiv klinische Post-Market-Daten für Katheterprodukte, was dem wachsenden PMCF-Druck unter MDR Anhang XIV, Teil B entspricht. Katheter-Hersteller sollten eigene PMCF-Studiendesigns kritisch an solchen Best-Practice-Beispielen spiegeln. <strong>[Urologie]</strong></li>\n</ul>\n\n<hr>\n\n<h2>4. Urologie & Klinische Evidenz</h2>\n\n<ul>\n  <li><strong>TITAN 2 Pivotal Study – Implantierbare tibiale Neuromodulation bei Urge-Inkontinenz:</strong> <strong>[Urologie]</strong> Die Studie liefert positive Daten für ein implantierbares System zur tibialen Neuromodulation bei Dranginkontinenz. Für Farco regulatorisch relevant: Diese klinischen Evidenzquellen müssen in CERs für Produkte im Bereich OAB/Inkontinenz berücksichtigt werden (MDR Anhang XIV, MDCG 2020-6). Implantierbare Neuromodulationsgeräte fallen typischerweise in Klasse III (Regel 8).</li>\n</ul>\n\n<ul>\n  <li><strong>EMBRACE RCT – ERAS-Protokoll bei ambulanter TURBT:</strong> <strong>[Urologie]</strong> Der randomisiert-kontrollierte Trial zur Enhanced Recovery after Surgery (ERAS) bei transurethraler Blasentumorchirurgie liefert neue Referenzdaten für perioperative Protokolle und assoziierte Produkte (Spülsysteme, Katheter, endoskopisches Zubehör). Für PMCF-Berichte und CERs urologisch-endoskopischer Instrumente stellt diese Publikation State-of-the-Art-Literatur dar.</li>\n</ul>\n\n<ul>\n  <li><strong>Intravesikale Botulinumtoxin-Injektion ambulant bei Kindern (Neurogenic Bladder):</strong> <strong>[Urologie]</strong> Die Machbarkeit und Verträglichkeit der awaken Botulinumtoxin-Applikation in der pädiatrischen Urologie ist regulatorisch besonders relevant für Drug-Device Combinations (MDR Art. 1(8)/(9)) sowie für Produkte, die in der pädiatrischen Anwendung eingesetzt werden – hier gelten verschärfte Anforderungen an klinische Evidenz und Risikobewertung. Farco sollte prüfen, inwiefern assoziierte Katheter- oder Applikatorprodukte betroffen sind.</li>\n</ul>\n\n<ul>\n  <li><strong>Ureterdilatation als Risikofaktor für HWI bei Kindern mit pränataler Hydronephrose:</strong> <strong>[Urologie]</strong> Die Publikation fordert eine Überarbeitung klinischer Leitlinien und liefert neue klinische Daten zur pädiatrischen Urologie. Für Hersteller urologischer Drainagesysteme und Katheter für pädiatrische Indikationen sind solche Evidenzupdates für die Risiko-Nutzen-Bewertung (MDR Anhang I, Abschnitt 1) und State-of-the-Art-Dokumentation relevant.</li>\n</ul>\n\n<ul>\n  <li><strong>Neues Framework: Androgenadäquanz vs. -inadäquanz beim Prostatakarzinom:</strong> Obwohl primär klinisch-wissenschaftlich, könnte ein Paradigmenwechsel im Hormonverständnis des Prostatakarzinoms mittel- bis langfristig die Indikationsstellung für BPH-Therapiegeräte und diagnostische Tests beeinflussen. Für Farco mit BPH-Fokus sollte diese Entwicklung im Rahmen des PMS-Systems (MDR Art. 84) beobachtet werden. <strong>[Urologie]</strong></li>\n</ul>\n\n<hr>\n\n<h2>Ausblick & Handlungsempfehlung</h2>\n\n<p>Die heute publizierten klinischen Daten – insbesondere aus den Bereichen Neuromodulation, Inkontinenz und pädiatrische Urologie – sind zeitnah auf ihre Relevanz für offene CER- und PMCF-Aktivitäten bei Farco zu prüfen und ggf. als neue State-of-the-Art-Literatur in das PMS-System einzuspeisen. Medtronics Akquisitionsstrategie im Neuromodulationsbereich sollte als Marktsignal für das kompetitive Umfeld im OAB/Inkontinenz-Segment bewertet werden.</p>\n\n<hr>\n\n<p><em>Quellen: MedTech Dive, Journal of Urology (AUA) – Stand 22.05.2026 | Erstellt für Regulatory Affairs, Farco Pharma GmbH</em></p><details class=\"src-details\"><summary class=\"src-summary\"><span class=\"src-arrow\">▶</span>📰 Quellen &amp; Schlagzeilen (20 Artikel)</summary><div class=\"src-body\"><div class=\"src-category\"><div class=\"src-category-name\">MedTech-Industrie</div><div class=\"src-source\"><div class=\"src-source-name\">MedTech Dive</div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/medtronic-to-create-european-software-hub-in-ireland/820999/\" target=\"_blank\" class=\"src-link\">Medtronic to create European software hub in Ireland</a><span class=\"src-date\">22.05.2026, 14:58</span></div><div class=\"src .51%</td><td class=\"mkt-range\"><div class=\"mkt-range-labels\"><span>$47.55</span><span>$64.36</span></div><div class=\"mkt-track\"><div class=\"mkt-dot\" style=\"left:15.3%\"></div></div></td><td class=\"mkt-pct mkt-pos \">+2.81%</td><td class=\"mkt-pct mkt-neg \">-5.95%</td><td class=\"mkt-pct mkt-neg \">-18.94%</td></tr></tbody></table><div class=\"mkt-analysis\"><div class=\"mkt-analysis-title\">🔍 Kursbewegungen &amp; Marktkontext</div><p>Analyse: Heutige Kursbewegungen im Kontext der gestrigen Nachrichten</p><p>Die breite Schwäche im MedTech-Sektor – abgebildet durch den iShares MedTech ETF mit <strong>-1,51 %</strong> – spiegelt ein sektortypisches Risikosentiment wider, das sich durch das Fehlen positiver regulatorischer Katalysatoren (keine neuen MDCG-Leitlinien, keine FDA-Entscheidungen von breiterer Marktrelevanz) erklären lässt. <strong>Boston Scientifics leichter Rückgang von -0,35 %</strong> ist angesichts der gestrigen positiven IVL-Katheter-Daten und der strategisch ambitionierten MiRus-Investition <strong>kontraintuitiv</strong>, deutet aber darauf hin, dass der Markt die 1,5-Mrd.-USD-Akquisition kurzfristig als Bewertungsrisiko statt als Wachstumssignal einpreist. Der deutliche Rückgang bei <strong>Teleflex (-1,98 %)</strong> und <strong>BD (-1,69 %)</strong> ist im Kontext des Briefings bemerkenswert, da BD durch den angekündigten Führungswechsel im Kathetersegment strategische Unsicherheit signalisiert – Märkte bestrafen Führungstransitionen in kompetitiven Segmenten häufig kurzfristig. <strong>Coloplast (+0,46 %)</strong> und <strong>Siemens Healthineers (+0,82 %)</strong> zeigen relative Stärke, was plausibel ist, da beide Unternehmen im gestrigen Briefing nicht mit M&amp;A-Risiken oder Führungswechseln belastet wurden und Coloplast als Inkontinenz-Spezialist indirekt von der wachsenden klinischen Evidenz zur Neuromodulation (TITAN 2) profitieren könnte. Insgesamt ergibt das Bild eines Sektors, der in Abwesenheit starker positiver regulatorischer oder klinischer Impulse unter moderatem Verkaufsdruck steht, wobei die Outperformer jene Unternehmen sind, die im aktuellen Nachrichtenfluss am wenigsten mit Unsicherheitsfaktoren behaftet erscheinen.</p></div></div>\n\n<h1>Regulatory Affairs Briefing – Medizinprodukte & Urologie</h1>\n<p><strong>Farco Pharma GmbH | 21. Mai 2026</strong></p>\n\n<hr>\n\n<h2>Einleitung</h2>\n\n<p>Der heutige Tag ist regulatorisch ruhig – aus MDR/IVDR-Quellen sowie der Vigilanz liegen keine neuen Schlagzeilen vor. Der Fokus verschiebt sich damit auf industrielle Marktbewegungen im MedTech-Sektor sowie klinische Evidenz aus der Urologie, die für PMCF-Planung, Clinical Evaluation und die Beobachtung von Wettbewerbern relevant sind. Insbesondere neue klinische Daten zu implantierbarer Neuromodulation und intravesikaler Botulinumtoxin-Injektion bei pädiatrischen Patienten verdienen die Aufmerksamkeit des Regulatory-Teams bei Farco.</p>\n\n<hr>\n\n<h2>1. MDR & IVDR – Regulatorik</h2>\n\n<p>> ⚠️ <strong>Für heute liegen keine neuen regulatorischen Schlagzeilen aus EU-Quellen vor.</strong></p>\n\n<p><strong>Regulatorische Einschätzung:</strong></p>\n\n<ul>\n  <li>In Ermangelung neuer MDCG-Leitlinien, Notified-Body-Kommuniqués oder Kommissionsentscheidungen besteht kein unmittelbarer Handlungsbedarf.</li>\n  <li>Laufende interne Prozesse (EUDAMED-Registrierungen, UDI-Compliance, PMS-Berichte, CER-Updates) sollten planmäßig fortgeführt werden.</li>\n  <li>Empfehlung: EUDAMED-Datenbank und EU-Amtsblatt auf verzögert veröffentlichte Durchführungsrechtsakte und Übergangsregelungen (vgl. zuletzt VO (EU) 2024/1860) regelmäßig prüfen.</li>\n</ul>\n\n<hr>\n\n<h2>2. Vigilanz & Sicherheit</h2>\n\n<p>> ⚠️ <strong>Für heute liegen keine neuen Vigilanzmeldungen, FSCAs oder Rückrufe vor.</strong></p>\n\n<p><strong>Regulatorische Einschätzung:</strong></p>\n\n<ul>\n  <li>Keine unmittelbaren Handlungspflichten nach MDR Art. 87–90 (Meldepflichten Hersteller) oder Art. 95 (Korrekturmaßnahmen).</li>\n  <li>Für urologische Produkte (Katheter, Inkontinenzhilfen) empfiehlt sich die tägliche Überprüfung von EUDAMED (sobald Vigilanz-Modul vollständig operativ) sowie der FDA MAUDE-Datenbank und den Datenbanken der nationalen Behörden (BfArM, MHRA).</li>\n  <li>Hinweis: Das BfArM veröffentlicht FSCAs typischerweise mit 24–48h Verzögerung nach EU-Koordinierung über SCENIHR/SCCS – ein Nachtlauf sollte eingeplant sein.</li>\n</ul>\n\n<hr>\n\n<h2>3. MedTech-Industrie – Marktbewegungen</h2>\n\n<ul>\n  <li><strong>[Wettbewerb]</strong> <strong>Boston Scientific</strong> meldet positive Daten für seinen koronaren IVL-Katheter (Intravascular Lithotripsy) und investiert gleichzeitig <strong>1,5 Mrd. USD</strong> in einen TAVR-Entwickler (MiRus). Dies unterstreicht die strategische Expansion von BSc in interventionelle Gefäß- und Herztherapien – der Urology-Bereich (Steinbehandlung, Endoskopie) bleibt ein Kerngeschäft, das Farco im Blick behalten sollte. <strong>[Urologie]</strong> Die IVL-Technologie findet auch urologische Anwendung (Harnsteinzertrümmerung); klinische Evidenz aus kardialen Studien kann regulatorisch als Analogiedaten in CErs herangezogen werden (MDR Anhang XIV, MDCG 2020-6).</li>\n</ul>\n\n<ul>\n  <li><strong>[Wettbewerb]</strong> <strong>Medtronic</strong> akquiriert <strong>SPR Therapeutics</strong> für ca. <strong>650 Mio. USD</strong> – ein Unternehmen mit Fokus auf periphere Nervenstimulation (Sprint PNS System). Dies stärkt Medtronics Portfolio im Bereich Neuromodulation erheblich und ist direkt relevant für den urologischen Markt (Sakrale Neuromodulation, OAB-Behandlung). Regulatorische Implikation: Bei künftigen Medtronic-Produkten in diesem Segment ist eine Kombination aus bestehendem InterStim-Portfolio und SPR-Technologie denkbar – zu beobachten hinsichtlich Notified-Body-Prozessen und klinischer Datenlage nach MDR Anhang XIV/XV.</li>\n</ul>\n\n<ul>\n  <li><strong>[Wettbewerb]</strong> <strong>Embecta</strong> schließt die Übernahme von <strong>Owen Mumford</strong> für bis zu <strong>201 Mio. USD</strong> ab. Owen Mumford ist ein etablierter Hersteller von Injektions- und Diagnosedevices. Für Farco als Unternehmen mit Interesse an Drug-Device Combinations (MDR Art. 1(8)/(9)) ist dies eine relevante Marktkonsolidierung im Bereich Kombinationsprodukte und Verabreichungssysteme.</li>\n</ul>\n\n<ul>\n  <li><strong>Guardant Health</strong> erhält FDA-Zulassung für ein aktualisiertes <strong>Liquid Biopsy</strong>-System (IVD). Dies ist primär onkologisch relevant, unterstreicht jedoch den regulatorischen Trend zu nicht-invasiven Diagnosetests – relevant für die IVDR-Beobachtung bei urologischen Tumormarkern (z. B. Blasenkarzinom-Diagnostik). <strong>[Urologie]</strong></li>\n</ul>\n\n<ul>\n  <li><strong>Endologix</strong> erwirbt ein Thrombusentferngungssystem von <strong>Surmodics</strong>. Regulatorisch relevant als Beispiel für Portfolioerweiterung durch Asset-Deals – eine Strategie, die auch bei MDR-Übergangsprozessen (Übernahme bestehender technischer Dokumentation, CE-Zertifikate) erhebliche Due-Diligence-Anforderungen mit sich bringt (MDR Art. 10, Anhang II/III).</li>\n</ul>\n\n<hr>\n\n<h2>4. Urologie – Klinische Evidenz & Wettbewerb</h2>\n\n<ul>\n  <li><strong>[Urologie] [Wettbewerb]</strong> <strong>TITAN 2 Pivotal Study</strong> (Journal of Urology): Implantierbare tibiale Neuromodulationstherapie zeigt signifikante Verbesserung bei Urge-Inkontinenz. Dieses Studienformat (pivotal RCT) erfüllt die Anforderungen an klinische Prüfungen nach MDR Anhang XV und liefert PMCF-relevante Daten für Wettbewerber im Neuromodulationsmarkt (u. a. Laborie Medical Technologies, Medtronic). Für Farco: Beobachten, welche Implantate konkret unter MDR-Klasse III zertifiziert werden – Auswirkungen auf den konservativen/pharmakologischen Behandlungsmarkt möglich.</li>\n</ul>\n\n<ul>\n  <li><strong>[Urologie]</strong> <strong>EMBRACE RCT</strong> (ERAS für ambulante TURBT): Daten zur Enhanced Recovery After Surgery bei transurethraler Blasentumorresektion. Relevant für perioperative Produktanforderungen (Katheter, Spüllösungen, Einmalartikel). Ambulante Eingriffe erhöhen den Bedarf an einfach handhabbaren, sterilen Einmalprodukten – ein Segment, das Farco und Wettbewerber wie <strong>B. Braun</strong> und <strong>Teleflex</strong> bedienen. Regulatorische Implikation: Klinische Daten aus ERAS-Studien können in PMS/PMCF-Berichten als Post-Market-Evidenz referenziert werden (MDR Art. 61(11), MDCG 2020-7).</li>\n</ul>\n\n<ul>\n  <li><strong>[Urologie]</strong> <strong>Intravesikale Botulinumtoxin-Injektion</strong> im ambulanten pädiatrischen Setting (neurogenic bladder): Die Studie bestätigt Durchführbarkeit und Verträglichkeit ohne Anästhesie. Für Farco als Unternehmen mit urologischem Schwerpunkt: Falls Botulinumtoxin als Drug-Device Combination (z. B. mit spezifischem Injektionssystem) positioniert wird, sind MDR Art. 1(8) und die Klassifizierungsregel MDR Anhang VIII Regel 21 zu beachten. Pädiatrische Anwendungen unterliegen zudem besonderen klinischen Evidenzanforderungen (MDR Anhang XIV, MDCG 2020-6).</li>\n</ul>\n\n<ul>\n  <li><strong>[Urologie]</strong> <strong>Ureterdilatation als Risikofaktor für HWI</strong> bei Kindern mit pränataler Hydronephrose: Studie fordert Überprüfung bestehender Leitlinien. Für Farco relevant hinsichtlich pädiatrischer Kathetersysteme und urologischer Drainageprodukte – ggf. sind bestehende Indikationserweiterungen oder Kennzeichnungsanpassungen nach MDR Art. 10(11) und Anhang I (GSPR) zu prüfen.</li>\n</ul>\n\n<ul>\n  <li><strong>[Urologie]</strong> <strong>Testosterone & Prostatakarzinom</strong> (neues Androgen-Adequacy-Framework): Das Journal of Urology präsentiert ein überarbeitetes pathophysiologisches Modell. Klinisch-wissenschaftlich relevant für BPH- und Prostatakarzinom-Produkte; für Regulatory Affairs bei Farco: Indikationstexte, IFU-Inhalte und klinische Bewertungen (CER) für BPH-bezogene Produkte sollten mit aktueller wissenschaftlicher Literatur abgeglichen werden (MDR Anhang XIV, State of the Art).</li>\n</ul>\n\n<hr>\n\n<h2>Ausblick</h2>\n\n<p>Das Regulatory-Team bei Farco sollte die <strong>Medtronic/SPR-Akquisition</strong> und die <strong>TITAN-2-Studiendaten</strong> zur implantierbaren Neuromodulation engmaschig verfolgen, da sich hieraus mittelfristig ein verändertes Wettbewerbs- und Evidenzumfeld für konservative urologische Therapien ergibt. Ebenso empfiehlt sich eine proaktive Prüfung interner CERs und PMS-Berichte auf Aktualität der klinischen Hintergrunddaten – insbesondere für Produkte mit Berührung zu Neuromodulation, TURBT-Perioperatik und pädiatrischer Urologie.</p>\n\n<hr>\n\n<p><em>Quellen: MedTech Dive, Journal of Urology (AUA) | Briefing erstellt für Farco Pharma GmbH / MCM Klosterfrau | Stand: 21.05.2026</em></p><details class=\"src-details\"><summary class=\"src-summary\"><span class=\"src-arrow\">▶</span>📰 Quellen &amp; Schlagzeilen (20 Artikel)</summary><div class=\"src-body\"><div class=\"src-category\"><div class=\"src-category-name\">MedTech-Industrie</div><div class=\"src-source\"><div class=\"src-source-name\">MedTech Dive</div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/strykers-chief-accounting-officer-to-retire/820874/\" target=\"_blank\" class=\"src-link\">Stryker’s chief accounting officer to retire</a><span class=\"src-date\">21.05.2026, 15:06</span></div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/guardant-wins-fda-approval-for-updated-liquid-biopsy/820829/\" target=\"_blank\" class=\"src-link\">Guardant wins FDA approval for updated liquid biopsy</a><span class=\"src-date\">21.05.2026, 14:00</span></div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/medtronic-to-buy-spr-therapeutics-for-about-650m/820752/\" target=\"_blank\" class=\"src-link\">Medtronic to buy SPR Therapeutics for about $650M</a><span class=\"src-date\">20.05.2026, 17:45</span></div><div class=\"src-item\"><a href=\"https://www.medtechdive .04%</td><td class=\"mkt-range\"><div class=\"mkt-range-labels\"><span>$47.55</span><span>$64.36</span></div><div class=\"mkt-track\"><div class=\"mkt-dot\" style=\"left:19.4%\"></div></div></td><td class=\"mkt-pct mkt-pos \">+4.73%</td><td class=\"mkt-pct mkt-neg \">-2.84%</td><td class=\"mkt-pct mkt-neg \">-17.85%</td></tr></tbody></table><div class=\"mkt-analysis\"><div class=\"mkt-analysis-title\">🔍 Kursbewegungen &amp; Marktkontext</div><p>Analyse der heutigen Kursbewegungen im Kontext des gestrigen Briefings</p><p>Die breite positive Tendenz im MedTech-Sektor – sichtbar am iShares MedTech ETF mit +1,04 % – spiegelt das insgesamt stabile regulatorische Umfeld wider: Keine FSCAs, keine Vigilanzmeldungen und keine belastenden MDR/IVDR-Entwicklungen schaffen ein risikoarmes Sentiment, das sektorweit stützend wirkt. <strong>Boston Scientific</strong> bildet mit –0,44 % die einzige negative Ausnahme, was angesichts der gestern gemeldeten positiven IVL-Katheter-Daten und der 1,5-Mrd.-USD-Akquisition zunächst <strong>kontraintuitiv erscheint</strong> – der Kursrückgang könnte jedoch auf Marktskepsis gegenüber der hohen Kapitalbindung durch die MiRus-Übernahme zurückzuführen sein, da Klasse-III-Produkte wie IVL-Katheter lange und kostspielige klinische Zulassungswege erfordern. <strong>BD/C.R. Bard</strong> legt mit +1,21 % zu, was plausibel ist, da der angekündigte Führungswechsel von Investoren offenbar als strategische Neuausrichtungschance und nicht als Destabilisierungssignal interpretiert wird. <strong>Coloplast</strong> (+1,85 %) und <strong>Teleflex</strong> (+1,53 %) profitieren vermutlich von der positiven klinischen Evidenzlage im urologischen Bereich – insbesondere die TITAN-2-Studie und die EMBRACE-Daten stärken das Marktvertrauen in Inkontinenz- und Katheterprodukte als wachstumsstabile Segmente ohne unmittelbaren Regulierungsdruck. Insgesamt sind die heutigen Kursbewegungen im Kontext des gestrigen Briefings weitgehend plausibel erklärbar, wobei der Rückgang bei Boston Scientific als einzige bemerkenswerte Ausnahme die Ambivalenz des Marktes gegenüber kapitalintensiven Akquisitionen im Hochrisikoregulierungsumfeld illustriert.</p></div></div>\n\n<h1>Regulatory Affairs Briefing – Medizinprodukte & Urologie</h1>\n<p><strong>Datum: 20. Mai 2026 | Erstellt für: RA/QM Farco Pharma GmbH</strong></p>\n\n<hr>\n\n<h2>Einleitung</h2>\n\n<p>Der heutige Tag bietet keine akuten MDR/IVDR-Vigilanzereignisse oder behördlichen Entscheidungen mit unmittelbarem Handlungsbedarf. Der regulatorische Fokus liegt auf klinischen Entwicklungen im urologischen Bereich – insbesondere Neuromodulation, Drug-Device-Kombinationen und ambulante Verfahren – sowie auf strategischen M&A-Bewegungen bei MedTech-Wettbewerbern, die mittelfristige Marktverschiebungen signalisieren. Für Farco Pharma sind vor allem die klinischen Daten zu Neuromodulation, intravesikaler Botulinum-Toxin-Anwendung und ambulanter Urologie als PMCF- und State-of-the-Art-relevante Erkenntnisse einzuordnen.</p>\n\n<hr>\n\n<h2>1. MDR & Regulatorik</h2>\n\n<p>> ⚠️ <em>Keine tagesaktuellen Schlagzeilen verfügbar. Nachfolgende Punkte basieren auf dem regulatorischen Hintergrundrauschen.</em></p>\n\n<ul>\n  <li><strong>Kein akuter MDCG-Output oder Notifizierungsereignis</strong> gemeldet. PMS- und PMCF-Zyklen laufen weiter gemäß MDR Anhang XIV; Unternehmen sollten laufende CER-Updates nicht auf Basis fehlender Tages-News verzögern.</li>\n  <li><strong>EUDAMED-Rollout</strong>: Der vollständige Betrieb bleibt ein kontinuierliches Compliance-Thema. UDI-Datenpflege und Akteur-Registrierungspflichten nach MDR Art. 31 ff. sind laufend zu überwachen.</li>\n  <li><strong>Stille Tage im Regulatory Calendar sind Planungsfenster</strong>: Interne Audits, technische Dokumentationslücken (MDR Anhang II/III) und GSPR-Reviews (Anhang I) können genutzt werden, ohne externe Ereignisse priorisieren zu müssen.</li>\n  <li><strong>Keine neuen MDCG-Leitlinien veröffentlicht</strong> – bestehende Orientierungsdokumente (insb. MDCG 2020-5 zur klinischen Bewertung, MDCG 2022-21 zu PMCF) bleiben aktueller Maßstab für laufende Bewertungen.</li>\n</ul>\n\n<hr>\n\n<h2>2. Vigilanz & Sicherheit</h2>\n\n<p>> ⚠️ <em>Keine tagesaktuellen FSCAs, Rückrufe oder Vigilanzmeldungen verfügbar.</em></p>\n\n<ul>\n  <li><strong>Kein FSCA im urologischen Segment</strong> gemeldet. Die Abwesenheit von Meldungen entbindet nicht von der PMS-Pflicht nach MDR Art. 83–86; reaktive Überwachung ist durch proaktive Literatur- und Datenbankrecherche zu ergänzen.</li>\n  <li><strong>Urologische Katheter und Inkontinenzprodukte</strong> (Risikoklasse IIa/IIb nach MDR) erfordern kontinuierliches Screening von EUDAMED, BfArM-Datenbank und FDA MAUDE auf vergleichbare Produkte – auch bei Fehlen eigener Ereignisse.</li>\n  <li><strong>Vigilanz-Reminder</strong>: Hersteller von Klasse-IIb-Produkten (z. B. beschichtete Katheter mit Drug Component) müssen Serious Incidents innerhalb von 15 Tagen (bei schwerwiegenden Ereignissen) bzw. 30 Tagen (bei nicht unmittelbar lebensbedrohlichen Fällen) an die zuständige Behörde melden (MDR Art. 87).</li>\n  <li><strong>Trendreporting</strong> nach MDR Art. 88: Gehäufte Nicht-serious-Incidents, die eine Mustererkennung auslösen, sind meldepflichtig – dies gilt auch für urologische Einmalkatheter mit bekannten Komplikationsmustern (UTI, Trauma).</li>\n</ul>\n\n<hr>\n\n<h2>3. MedTech-Industrie & Wettbewerb</h2>\n\n<ul>\n  <li><strong>[Wettbewerb]</strong> <strong>Boston Scientific</strong> veröffentlicht positive Daten für koronaren IVL-Katheter (Intravascular Lithotripsy) und erwirbt gleichzeitig einen 1,5-Mrd.-USD-Anteil am TAVR-Entwickler MiRus. Die strategische Investitionsbereitschaft von BSC in katheterbasierte Technologien und Lithotripsie-Plattformen ist langfristig im Blick zu behalten – Lithotripsy-Kompetenz könnte perspektivisch auf urologische Anwendungen (Harnsteinbehandlung) übertragen werden. <strong>[Urologie]</strong></li>\n</ul>\n\n<ul>\n  <li><strong>[Wettbewerb]</strong> <strong>Endologix</strong> übernimmt ein Clot-Removal-System von Surmodics: Konsolidierung im Segment endovaskulärer Kathetersysteme setzt sich fort. Für Farco weniger direkt relevant, zeigt jedoch den Trend zu funktional erweiterten Katheterplattformen.</li>\n</ul>\n\n<ul>\n  <li><strong>[Wettbewerb]</strong> <strong>Medtronic</strong> und <strong>BD</strong> benennen neue Führungspersönlichkeiten. Strategische Neuausrichtungen bei diesen Marktteilnehmern – insb. Medtronic im Bereich Neuromodulation (Urologie) und BD im Kathetersegment – sollten beobachtet werden. Führungswechsel können Portfoliostrategie und Marktbearbeitung beeinflussen.</li>\n</ul>\n\n<ul>\n  <li><strong>Embecta</strong> schließt die Übernahme von <strong>Owen Mumford</strong> für bis zu 201 Mio. USD ab. Owen Mumford ist Hersteller von Injektionssystemen und Drug-Delivery-Devices. Relevant als Signal für weiteres M&A im Drug-Device-Kombinations-Segment (vgl. MDR Art. 1(8)/(9)).</li>\n</ul>\n\n<ul>\n  <li><strong>Natera</strong> erhält FDA-Zulassung für einen Companion Diagnostic: Während dies primär den Oncology/IVD-Bereich betrifft, ist die regulatorische Entwicklung von Companion Diagnostics (IVDR Artikel 5, Klasse D) als strategisches Radar für personalisierte Urologiediagnostik (z. B. Blasenkrebs-Biomarker) einzuordnen.</li>\n</ul>\n\n<hr>\n\n<h2>4. Urologie – Klinische Evidenz & State of the Art</h2>\n\n<p><strong>[Urologie]</strong> Die aktuelle Ausgabe des <em>Journal of Urology</em> liefert mehrere PMCF- und CER-relevante Datenpunkte:</p>\n\n<ul>\n  <li><strong>Implantierbare Tibial-Neuromodulation (TITAN 2 Pivotal Study)</strong>: Positive Ergebnisse für implantierbare tibiale Neuromodulationstherapie bei Dranginkontinenz. <strong>[Urologie]</strong> → Direkte Relevanz für den State of the Art (SotA) bei Inkontinenz-Therapiesystemen; für Farcos CER/PMCF-Dokumentation zu Inkontinenzprodukten ist diese Studie als klinische Referenz einzupflegen (vgl. MDR Anhang XIV Teil A, MDCG 2020-5/2020-6). Wettbewerber Medtronic (InterStim) und Laborie sind in diesem Segment aktiv.</li>\n</ul>\n\n<ul>\n  <li><strong>Intravesikale Botulinum-Toxin-Injektion bei pädiatrischen Patienten (awake, ambulant)</strong>: Machbarkeit und gute Verträglichkeit im ambulanten Kinderurologie-Setting bestätigt. <strong>[Urologie]</strong> → Für Drug-Device-Kombinationen im intravesikalen Bereich (MDR Art. 1(8)/(9)) sowie für Katheter/Applikatoren in diesem Indikationsfeld ist dies ein relevanter klinischer Kontextdatenpunkt.</li>\n</ul>\n\n<ul>\n  <li><strong>EMBRACE RCT (ERAS für ambulante TURBT)</strong>: Randomisierte Studie belegt Machbarkeit und Vorteile von Enhanced Recovery After Surgery (ERAS)-Protokollen bei ambulanter TURBT. <strong>[Urologie]</strong> → Ambulantisierung urologischer Eingriffe beeinflusst Produktanforderungen an Einmalmaterialien (Katheter, Endoskopiezubehör); klinische Implikationen für Gebrauchsanweisung und Indikationsabdeckung beachten.</li>\n</ul>\n\n<ul>\n  <li><strong>Chronischer urologischer Beckenschmerz (MAPP II-Netzwerk)</strong>: Multidisziplinäre Daten zu Schmerzübergängen bei UCPPS. Für Produkte im Bereich Beckenbodentherapie und Neuromodulation relevant als epidemiologische Grundlage im Clinical Background (MDR Anhang II, Abschnitt 6.1).</li>\n</ul>\n\n<ul>\n  <li><strong>Ureteral Dilatation als UTI-Risikofaktor bei Kindern</strong>: Aufruf zur Revision von Praxisleitlinien. <strong>[Urologie]</strong> → Für pädiatrische Katheterprodukte und Drainagesysteme ist die UTI-Risikodiskussion ein bekannter Safety-Aspekt; PMCF-Planung sollte diesen Datenpunkt aufgreifen (vgl. MDR Art. 74, Anhang XIV Teil B).</li>\n</ul>\n\n<hr>\n\n<h2>Ausblick & Handlungsempfehlung</h2>\n\n<p>Regulatory Affairs bei Farco sollte die klinischen Daten aus dem <em>Journal of Urology</em> – insbesondere TITAN 2 und EMBRACE – zeitnah auf Relevanz für laufende CER/PMCF-Dokumentationen screenen und ggf. als State-of-the-Art-Quellen einpflegen. Die strategischen M&A-Aktivitäten von Boston Scientific im Lithotripsie- und Katheterbereich sowie Führungswechsel bei Medtronic und BD sind als Frühwarnsignale für veränderte Wettbewerbsdynamiken im urologischen Segment zu registrieren und im nächsten Marktüberwachungsbericht zu dokumentieren.</p>\n\n<hr>\n\n<p><em>Quellen: MedTech Dive, Journal of Urology (AUA) – Ausgabe 20.05.2026 | Erstellt auf Basis verfügbarer Schlagzeilen ohne Gewähr auf Vollständigkeit</em></p><details class=\"src-details\"><summary class=\"src-summary\"><span class=\"src-arrow\">▶</span>📰 Quellen &amp; Schlagzeilen (20 Artikel)</summary><div class=\"src-body\"><div class=\"src-category\"><div class=\"src-category-name\">MedTech-Industrie</div><div class=\"src-source\"><div class=\"src-source-name\">MedTech Dive</div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/medtronic-data-back-renal-denervation-in-the-long-term/820739/\" target=\"_blank\" class=\"src-link\">Medtronic data back renal denervation in the long term</a><span class=\"src-date\">20.05.2026, 15:25</span></div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/endologix-buys-clot-removal-system-from-surmodics/820686/\" target=\"_blank\" class=\"src-link\">Endologix buys clot removal system from Surmodics</a><span class=\"src-date\">20.05.2026, 07:43</span></div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/medtronic-bd-name-new-leaders/820619/\" target=\"_blank\" class=\"src-link\">Medtronic, BD name new leaders</a><span class=\"src-date\">19.05.2026, 15:42</span></div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/boston-scientific-posts-positive-data-for-coronary-ivl-catheter/820612/\" target=\"_blank\" class=\"src-link\">Boston Scientific posts positive data for coronary IVL catheter</a><span class=\"src-date\">19.05.2026, 15:05</span></div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/artivion-closes-endospan-buyout-to-acquire-recent 81%</td><td class=\"mkt-range\"><div class=\"mkt-range-labels\"><span>$47.55</span><span>$64.36</span></div><div class=\"mkt-track\"><div class=\"mkt-dot\" style=\"left:15.7%\"></div></div></td><td class=\"mkt-pct mkt-pos \">+3.05%</td><td class=\"mkt-pct mkt-neg \">-6.82%</td><td class=\"mkt-pct mkt-neg \">-18.85%</td></tr></tbody></table><div class=\"mkt-analysis\"><div class=\"mkt-analysis-title\">🔍 Kursbewegungen &amp; Marktkontext</div><p>Analyse: Heutige Kursbewegungen im Kontext der gestrigen MedTech-Nachrichten</p><p>Die moderate, aber breite Aufwärtsbewegung über nahezu alle beobachteten MedTech-Werte hinweg – vom ETF (+0,81 %) über BD (+2,66 %) bis zu Boston Scientific (+0,96 %) – ist im Kontext des gestrigen Briefings grundsätzlich plausibel, da trotz des Medline-Rückrufs keine systemischen Regulatorik-Schocks gemeldet wurden und das Marktsentiment durch die strategischen M&amp;A-Aktivitäten (BSC/MiRus, Embecta/Owen Mumford) sowie die FDA-Zulassung für Nateras Companion Diagnostic eher positiv geprägt war. Der auffällig starke Anstieg bei BD/C.R. Bard (+2,66 %) ist dabei auf den ersten Blick kontraintuitiv, da BD über seine Spindoff-Tochter Embecta mittelbar in den Medline-Syringe-Rückruf und den Owen-Mumford-Deal eingebunden ist – beides Ereignisse, die kurzfristig eher Unsicherheit signalisieren; möglicherweise wird der Embecta-Deal vom Markt jedoch als wertsteigernde Portfoliokonsolidierung im Drug-Delivery-Segment bewertet. Boston Scientifics solide Performance (+0,96 %) trotz der signifikanten $1,5-Mrd.-Kapitalallokation in MiRus/TAVR deutet darauf hin, dass Investoren die strategische Diversifikation in kardiovaskuläre Hochtechnologie honorieren, auch wenn dies mittelfristig Ressourcen aus dem urologischen Segment abzieht. Coloplasts nahezu stagnante Entwicklung (+0,02 %) ist im Kontext des Briefings bemerkenswert, da neue PMCF-relevante Inkontinenz-Daten (TITAN 2) eigentlich als positiver Impulsgeber für Spezialhersteller im Urologie-Segment hätten wirken können – hier dürfte jedoch das Fehlen direkt produktspezifischer Zulassungsnachrichten sowie die allgemeine regulatorische Stille auf MDR/IVDR-Ebene dämpfend gewirkt haben. Insgesamt spiegelt die Kurslage einen vorsichtig-positiven Markttag wider, der weniger durch konkrete regulatorische Entscheidungen getrieben ist als durch die strategische M&amp;A-Dynamik und das Ausbleiben negativer Vigilanzereignisse mit Marktwirkung.</p></div></div>\n\n<h1>Regulatory Affairs Briefing – Medizinprodukte & Urologie</h1>\n<p><strong>Farco Pharma GmbH | 19. Mai 2026</strong></p>\n\n<hr>\n\n<h2>Einleitung</h2>\n\n<p>Der heutige Tag ist regulatorisch ruhig: Weder aus dem MDR/IVDR-Umfeld noch aus dem Vigilanz-Bereich liegen meldepflichtige Ereignisse oder neue Leitlinien vor. Den Schwerpunkt des Briefings bilden daher Markt- und Wettbewerbsentwicklungen im MedTech-Sektor sowie klinisch relevante Neuveröffentlichungen aus dem urologischen Fachbereich, die mittel- bis langfristige Implikationen für die klinische Bewertung (CER, PMCF) und die Produktstrategie bei Farco haben können.</p>\n\n<hr>\n\n<h2>1. MDR & IVDR – Regulatorik</h2>\n\n<p>> ⚠️ <strong>Heute keine regulatorischen Neuigkeiten verfügbar.</strong></p>\n\n<p>Keine neuen MDCG-Leitlinien, Durchführungsakte, Guidance-Dokumente der Europäischen Kommission oder EMA-Stellungnahmen gemeldet. Bekannte laufende Themen bleiben im Blick zu behalten (siehe Ausblick).</p>\n\n<hr>\n\n<h2>2. Vigilanz & Produktsicherheit</h2>\n\n<p>> ⚠️ <strong>Heute keine FSCAs, Rückrufe oder Vigilanzmeldungen gemeldet.</strong></p>\n\n<p>Keine Field Safety Corrective Actions (FSCAs) oder behördlichen Warnmeldungen für urologische Produkte oder Wettbewerber registriert. Die Vigilanz-Lage erscheint aktuell stabil. Regelmäßige Überprüfung von EUDAMED (Modul SRN/Vigilanz), BfArM-Datenbank und FDA MAUDE empfohlen.</p>\n\n<hr>\n\n<h2>3. MedTech-Industrie – Markt & Wettbewerb</h2>\n\n<ul>\n  <li><strong>[Wettbewerb]</strong> <strong>Boston Scientific</strong> veröffentlicht positive Daten für den koronaren IVL-Katheter (Intravascular Lithotripsy) und investiert parallel 1,5 Mrd. USD in den TAVR-Entwickler MiRus. Dies unterstreicht die Kapitalstärke und Akquisitionsstrategie von BSC – einem Schlüsselwettbewerber auch im urologischen Segment (z. B. Lithotripsie, Endoskopie). Die IVL-Technologie ist regulatorisch als Klasse III eingestuft (MDR Anhang VIII, Regel 7/8); klinische Datenanforderungen sind entsprechend hoch.</li>\n</ul>\n\n<ul>\n  <li><strong>[Wettbewerb]</strong> <strong>BD (Becton Dickinson)</strong> benennt neue Führungsebene – strategische Neuausrichtung möglich. BD/C.R. Bard ist direkter Wettbewerber im urologischen Katheterbereich. Führungswechsel können Signalwirkung für Portfolioprioritäten und Marktverhalten haben; Entwicklung sollte beobachtet werden.</li>\n</ul>\n\n<ul>\n  <li><strong>Embecta</strong> schließt die Übernahme von <strong>Owen Mumford</strong> für bis zu 201 Mio. USD ab. Owen Mumford ist bekannt für Drug-Delivery-Devices und Kombinationsprodukte. Relevant als Beobachtungspunkt für den Bereich Drug-Device Combinations (MDR Art. 1(8)/(9)) – ein Segment, das auch für Farco strategisch bedeutsam ist.</li>\n</ul>\n\n<ul>\n  <li><strong>Artivion</strong> übernimmt <strong>Endospan</strong> und sichert sich damit ein kürzlich zugelassenes kardiovaskuläres Implantat. Zeigt die anhaltende M&A-Dynamik im MedTech-Sektor; für Farco weniger direkt relevant, illustriert aber die beschleunigte Marktkonsolidierung.</li>\n</ul>\n\n<ul>\n  <li><strong>Carl Zeiss</strong> kündigt Restrukturierung mit Abbau von bis zu 1.000 Stellen an. Carl Zeiss ist u. a. im Bereich Endoskopie/Uroskopie aktiv (Konkurrenz zu Karl Storz). Kapazitätsreduktionen könnten Auswirkungen auf Lieferketten optischer Systeme und Support-Strukturen haben – für Farco als Nutzer endoskopischer Systeme im Hintergrund relevant.</li>\n</ul>\n\n<hr>\n\n<h2>4. Urologie & Klinische Evidenz – <strong>[Urologie]</strong></h2>\n\n<ul>\n  <li><strong>[Urologie]</strong> <strong>Implantierbare tibiale Neuromodulation (TITAN 2 Pivotal Study):</strong> Positive Ergebnisse für die Behandlung von Urge Urinary Incontinence (UUI). Implantierbare Neuromodulationssysteme sind MDR-Klasse III (Anhang VIII, Regel 6). Für Farco relevant als Marktbeobachtung im Inkontinenzbereich: Die Datenlage zu konkurrierenden und ergänzenden Therapieoptionen beeinflusst die klinische Bewertung konservativer/pharmakologischer Produkte (CER, Stand der Technik gemäß MDR Anhang XIV, MDCG 2020-6).</li>\n</ul>\n\n<ul>\n  <li><strong>[Urologie]</strong> <strong>ERAS-Protokoll für ambulante TURBT (EMBRACE RCT):</strong> Randomisierte kontrollierte Studie zu Enhanced Recovery After Surgery bei transurethraler Resektion von Blasentumoren. Relevanz für endoskopisches Zubehör, Spüllösungen und perioperative Produkte. ERAS-Daten können als klinischer Kontext in CERs für urologische Einweginstrumente und Instillationsprodukte herangezogen werden.</li>\n</ul>\n\n<ul>\n  <li><strong>[Urologie]</strong> <strong>Ureteral Dilation als Risikofaktor für UTI bei pädiatrischer Hydronephrose:</strong> Die Studie fordert eine Überarbeitung bestehender Leitlinien. Für Farco potenziell relevant: Produkte zur Katheterisierung und Harnwegspflege bei pädiatrischen Patienten unterliegen besonderen PMCF-Anforderungen (MDR Anhang XIV, Teil B); klinische Evidenz zu vulnerablen Patientengruppen ist gemäß MDR Art. 61 besonders sorgfältig zu dokumentieren.</li>\n</ul>\n\n<ul>\n  <li><strong>[Urologie]</strong> <strong>Awake intravesical Botulinumtoxin-Injektion bei pädiatrischen Patienten mit neurogener Blase:</strong> Machbarkeitsstudie belegt Durchführbarkeit im ambulanten Setting. Botulinumtoxin in der intravesikalen Anwendung ist ein klassisches Drug-Device-Grenzgebiet (MDR Art. 1(8)/(9)); für Farco relevant hinsichtlich der Abgrenzung von Verabreichungssystemen und der regulatorischen Einordnung von Kombinationsprodukten.</li>\n</ul>\n\n<ul>\n  <li><strong>[Urologie]</strong> <strong>Neues Framework: Androgen Adequacy vs. Inadequacy bei Prostatakarzinom / Low Testosterone und Progression unter Active Surveillance:</strong> Zwei Publikationen stellen das klassische Testosteron-Paradigma in der Prostatakarzinom-Therapie in Frage. Für Farco relevant als Beobachtung des klinischen Umfelds im BPH/Prostatakarzinom-Bereich – Änderungen in Behandlungsalgorithmen können Marktpotenziale und klinische Evidenzanforderungen für begleitende Produkte verschieben.</li>\n</ul>\n\n<hr>\n\n<h2>Ausblick – Handlungsempfehlung für Farco Regulatory Affairs</h2>\n\n<p>Die regulatorische Ruhe von heute sollte genutzt werden, um laufende CER- und PMCF-Updates für urologische Katheter und Inkontinenzprodukte mit der frischen klinischen Evidenz aus dem AUA-Journal (insb. TITAN 2, EMBRACE) abzugleichen und den „State of the Art\" gemäß MDCG 2020-6 zu aktualisieren. Zudem sollte die M&A-Aktivität rund um Drug-Device-Kombinationsprodukte (Embecta/Owen Mumford) als Marktsignal für die eigene Positionierung im Bereich MDR Art. 1(8)/(9) beobachtet werden.</p>\n\n<hr>\n\n<p><em>Quellen: MedTech Dive, Journal of Urology (AUA), Stand 19.05.2026. Kein Anspruch auf Vollständigkeit; keine Rechtsberatung.</em></p><details class=\"src-details\"><summary class=\"src-summary\"><span class=\"src-arrow\">▶</span>📰 Quellen &amp; Schlagzeilen (20 Artikel)</summary><div class=\"src-body\"><div class=\"src-category\"><div class=\"src-category-name\">MedTech-Industrie</div><div class=\"src-source\"><div class=\"src-source-name\">MedTech Dive</div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/medtronic-bd-name-new-leaders/820619/\" target=\"_blank\" class=\"src-link\">Medtronic, BD name new leaders</a><span class=\"src-date\">19.05.2026, 15:42</span></div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/boston-scientific-posts-positive-data-for-coronary-ivl-catheter/820612/\" target=\"_blank\" class=\"src-link\">Boston Scientific p 1.96%</td><td class=\"mkt-range\"><div class=\"mkt-range-labels\"><span>$47.55</span><span>$64.36</span></div><div class=\"mkt-track\"><div class=\"mkt-dot\" style=\"left:11.1%\"></div></div></td><td class=\"mkt-pct mkt-pos \">+3.91%</td><td class=\"mkt-pct mkt-neg \">-8.87%</td><td class=\"mkt-pct mkt-neg \">-20.10%</td></tr></tbody></table><div class=\"mkt-analysis\"><div class=\"mkt-analysis-title\">🔍 Kursbewegungen &amp; Marktkontext</div><p>Die breite positive Bewegung im MedTech-Sektor – sichtbar am iShares MedTech ETF mit +1,96 % – erscheint plausibel im Kontext der FDA-Clearances für KI-gestützte Diagnostikprodukte (Artera, Bayesian Health), die Investorenvertrauen in die regulatorische Handlungsfähigkeit der FDA signalisieren, obwohl gleichzeitig der Rücktritt von Commissioner Makary erhebliche Planungsunsicherheit schafft. Boston Scientific verzeichnet mit +4,06 % den stärksten Tagesgewinn, was im Zusammenhang mit dem J&amp;J-Launch eines verbesserten Shockwave-Katheters zunächst kontraintuitiv wirkt – möglicherweise profitiert Boston Scientific jedoch von Markterwartungen im Bereich interventioneller Devices und positioniert sich als Wettbewerber im wachsenden Lithotripsie- und Neuromodulationsmarkt, gestärkt durch die klinische Evidenz der TITAN 2-Studie. Coloplasts Anstieg von +2,54 % ist gut erklärbar durch die positiven klinischen Studienergebnisse im Bereich Inkontinenz und Neuromodulation (TITAN 2), da Coloplast als führender Anbieter urologischer und kontinenzbezogener Produkte direkt von einer gestärkten Evidenzbasis in diesem Therapiesegment profitiert. Der leichte Rückgang von BD/C.R. Bard um -0,33 % ist bemerkenswert und möglicherweise eine direkte Reaktion auf den Kaskadenrückruf fehlerhafter Medline-Syringes, da BD als großer Anbieter von Injektions- und Kit-Systemen einem erhöhten Reputations- und Compliance-Risiko ausgesetzt ist, selbst wenn eigene Produkte nicht unmittelbar betroffen sind. Siemens Healthineers mit moderatem +0,78 % spiegelt die verhaltene, aber positive Grundstimmung für Diagnostik- und SaMD-affine Unternehmen wider, während die regulatorische Unsicherheit durch den FDA-Führungswechsel eine stärkere Aufwärtsbewegung dämpft, da Siemens Healthineers mit seiner US-Zulassungsstrategie für bildgebende Systeme und KI-Lösungen besonders sensitiv auf CDRH-seitige Verzögerungsrisiken reagiert.</p></div></div>\n\n<h1>Regulatory Affairs Briefing – Medizinprodukte & Urologie</h1>\n<p><strong>Farco Pharma GmbH | 18. Mai 2026</strong></p>\n\n<hr>\n\n<h2>Einleitung</h2>\n\n<p>Der heutige Tag zeigt ein gemischtes Bild: Während aus den klassischen MDR/IVDR-Kanälen keine neuen regulatorischen Verlautbarungen vorliegen, liefern Industriebewegungen im MedTech-Sektor – insbesondere ein syrittenbedingter Sammelrückruf sowie strategische M&A-Aktivitäten relevanter Marktteilnehmer – konkrete Vigilanz- und Wettbewerbsimpulse. Im urologischen Fachbereich signalisieren neue klinische Studiendaten zu Neuromodulation, Botulinum-Toxin-Anwendungen und TURBT-Protokollen potenzielle Relevanz für PMCF-Strategien und klinische Bewertungen nach MDR Anhang XIV.</p>\n\n<hr>\n\n<h2>1. MDR & IVDR – Regulatorik</h2>\n\n<p>> <em>Keine neuen Schlagzeilen verfügbar.</em></p>\n\n<ul>\n  <li>Kein neues MDCG-Guidance-Dokument oder EUDAMED-Update gemeldet. Laufende Überwachungsaufgaben (EUDAMED-Befüllung, UDI-Compliance, CER-Aktualisierungszyklen) bleiben prioritär.</li>\n  <li>Stillstand auf regulatorischer Nachrichtenlage erhöht den internen Fokus: PMCF-Pläne und -Berichte für urologische Klasse-IIa/IIb-Produkte sollten auf aktuellem Stand gehalten werden, da Benannte Stellen zunehmend auf Datenaktualität achten.</li>\n  <li><strong>Handlungsempfehlung:</strong> Nutzung des ruhigen Nachrichtentages zur internen Prüfung offener Post-Market-Surveillance-Maßnahmen und zur Vorbereitung auf erwartete MDCG-Updates zur klinischen Bewertung (MDCG 2020-5/6/13).</li>\n</ul>\n\n<hr>\n\n<h2>2. Vigilanz & Sicherheit / Rückrufe</h2>\n\n<p>> <em>Keine behördlichen Vigilanzmeldungen gemeldet – jedoch relevanter Industrierückruf (MedTech Dive).</em></p>\n\n<ul>\n  <li><strong>Sammelrückruf: Medizinprodukte-Kits mit Medline-Spritzen</strong> – Vier Medizinproduktehersteller haben Kits zurückgerufen, die von einem Komponentenproblem mit Medline-Spritzen betroffen sind. Details zu betroffenen Produktkategorien, Lot-Nummern und FSCA-Klassifikation sind noch nicht öffentlich verfügbar; Monitoring der FDA-Datenbank (MAUDE/Recalls) und des EUDAMED-Vigilanzmoduls ist angezeigt.</li>\n  <li><strong>Regulatorische Implikation (MDR Art. 83–87 / Anhang IX–XI):</strong> Sollten betroffene Kits Injektionssysteme oder Spülkomponenten für urologische Anwendungen enthalten (z. B. Irrigationssysteme, Instillationskits), ist die Lieferkette von Farco auf Komponentenherkunft zu prüfen. Unter MDR sind auch Zulieferkomponenten Teil der Risikomanagement-Dokumentation (ISO 14971).</li>\n  <li><strong>FSCA-Meldepflicht:</strong> Erhält Farco Kenntnis von Produkten in der Lieferkette, die von diesem Rückruf betroffen sind, greift die Meldepflicht nach MDR Art. 87 sowie die Pflicht zur Benachrichtigung wirtschaftlicher Akteure gemäß MDR Art. 14.</li>\n  <li><strong>Handlungsempfehlung:</strong> Lieferantenliste gegen bekannte Medline-Syringe-Komponenten abgleichen; ggf. Supplier-Corrective-Action-Request (SCAR) vorbereiten.</li>\n</ul>\n\n<hr>\n\n<h2>3. MedTech-Industrie & Wettbewerb</h2>\n\n<ul>\n  <li><strong>[Wettbewerb]</strong> <strong>Boston Scientific – $1,5 Mrd. Beteiligung an MiRus (TAVR):</strong> Strategische Kapitalallokation in kardiovaskuläre Hochtechnologie signalisiert, dass Boston Scientific seine Ressourcen partiell aus dem Urologie-Segment umschichtet. Für Farco: Beobachten, ob dies zu einer veränderten Priorisierung im urologischen Portfolio von BSC (Stents, Lithotripsie, BPH-Behandlung) führt. <strong>[Urologie]</strong></li>\n  <li><strong>Embecta übernimmt Owen Mumford für bis zu $201 Mio.:</strong> Embecta (Spindoff von BD) stärkt damit seine Drug-Delivery-Komponenten-Kompetenz (Injektionshilfen, Pens). Für Farco relevant im Kontext von <strong>Drug-Device Combinations (MDR Art. 1(8)/(9))</strong>: Konsolidierung im Zulieferermarkt kann Verfügbarkeit und regulatorische Anforderungen an Kombinationsprodukt-Komponenten beeinflussen.</li>\n  <li><strong>Natera – FDA-Zulassung für Companion Diagnostic:</strong> Zulassung eines IVD als Companion Diagnostic unterstreicht die wachsende Bedeutung personalisierter Therapie-Begleitdiagnostik. Regulatorisch relevant für die IVDR-Klassifizierungspraxis bei Klasse-C/D-IVDs in Deutschland; Signalwirkung für MDR/IVDR-Schnittstellenprodukte.</li>\n  <li><strong>Carl Zeiss – Restrukturierung mit bis zu 1.000 Stellen:</strong> Zeiss ist im urologischen Endoskopie-Feld (Karl Storz ist direkter Wettbewerber, Zeiss im Bereich Operationsmikroskopie/Optik präsent) – Marktveränderungen im Optik- und Endoskopiesegment könnten mittelbar Lieferketten und Kooperationspartner betreffen. <strong>[Urologie]</strong></li>\n  <li><strong>Rückruf Medline-Spritzen-Kits (4 Hersteller):</strong> Siehe Kategorie Vigilanz – zusätzlich zu beachten: Reputations- und Marktkonsequenzen für betroffene Kit-Hersteller; mögliche Marktlücke im Kit-Segment kurzfristig.</li>\n</ul>\n\n<hr>\n\n<h2>4. Klinische Evidenz & Urologie – Implikationen für PMCF/CER</h2>\n\n<p><strong>[Urologie]</strong> Die aktuellen AUA-Veröffentlichungen liefern klinisch und regulatorisch verwertbare Erkenntnisse:</p>\n\n<ul>\n  <li><strong>TITAN 2 Pivotal Study – Implantable Tibial Neuromodulation (Urge Urinary Incontinence):</strong> Signifikante Symptomverbesserung belegt. Für Farco: Neue klinische Daten zur Inkontinenzbehandlung sind für PMCF-Berichte und State-of-the-Art-Analyse in CERs urologischer Inkontinenzprodukte direkt verwertbar (MDR Anhang XIV, Abschnitt 6.2). Neuromodulation als Wettbewerbsalternative zu pharmakologischen Ansätzen beobachten.</li>\n  <li><strong>EMBRACE RCT – ERAS-Protokoll für ambulante TURBT:</strong> Randomisierte Daten zu Enhanced Recovery after Surgery bei transurethraler Blasentumorresektion. Relevanz für klinische Bewertungen von Resektionsinstrumenten, Spülmedien und perioperativen Zugangssystemen; unterstützt PMCF-Datensammlung durch Outcome-Daten aus realer Versorgung.</li>\n  <li><strong>Awake intravesikale Botulinum-Toxin-Injektion bei pädiatrischen Patienten mit neurogener Blase:</strong> Machbarkeit und Verträglichkeit in ambulantem Outpatient-Setting belegt. <strong>[Urologie]</strong> Für Farco: Botulinum-Toxin gilt als Arzneimittel; zugehörige Applikationssysteme (Zystoskope, Injektionsnadeln) sind Medizinprodukte – Drug-Device Interface nach MDR Art. 1(8) beachten. Klinische Daten stützen ggf. Zweckbestimmungserweiterungen für Injektionssysteme.</li>\n  <li><strong>Ureteral Dilation als Risikofaktor für HWI bei Kindern mit pränataler Hydronephrose:</strong> Klinische Neuorientierung mit Signalwirkung auf Leitlinien für pädiatrische Drainagesysteme und Katheter. <strong>[Urologie]</strong> Relevanz für PMS-Datenauswertung und Risikomanagement nach ISO 14971, falls Farco pädiatrische Katheterprodukte führt oder entwickelt.</li>\n  <li><strong>Androgen Adequacy Framework – Neues Paradigma zur Prostatakrebs-Entstehung:</strong> Konzeptionelle Neuausrichtung bei BPH/PCa-Management. Keine unmittelbare MDR-Implikation, aber relevant für Farco-Produktpositionierung im BPH-Segment und für langfristige klinische Strategie.</li>\n</ul>\n\n<hr>\n\n<h2>Ausblick – To-Do für Regulatory Affairs bei Farco</h2>\n\n<p>Kurzfristig sollten der laufende Medline-Syringe-Rückruf auf Relevanz für eigene Produkt-Kits und Lieferketten geprüft sowie die neuen klinischen Daten aus dem AUA-Journal in laufende PMCF-Berichte und CER-Updates für urologische Produkte (insbesondere Inkontinenz, Instillation, Kathetersysteme) eingespeist werden. Mittelfristig gilt es, die M&A-Dynamik bei BSC und Embecta hinsichtlich möglicher Marktverschiebungen im urologischen Segment und bei Drug-Device-Combinations-Zulieferern strategisch zu monitoren.</p>\n\n<hr>\n\n<p><em>Briefing erstellt auf Basis verfügbarer Schlagzeilen vom 18.05.2026 | Farco Pharma GmbH – Regulatory Affairs & Quality</em></p><details class=\"src-details\"><summary class=\"src-summary\"><span class=\"src-arrow\">▶</span>📰 Quellen &amp; Schlagzeilen (20 Artikel)</summary><div class=\"src-body\"><div class=\"src-category\"><div class=\"src-category-name\">MedTech-Industrie</div><div class=\"src-source\"><div class=\"src-source-name\">MedTech Dive</div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/boston-scientific-buys-15b-stake-in-tavr-developer-mirus/820492/\" target=\"_blank\" class=\"src-link\">Boston Scientific buys $1.5B stake in TAVR developer MiRus</a><span class=\"src-date\">18.05.2026, 15:12</span></div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/embecta-closes-owen-mumford-acquisition-for-up-to-201m/820489/\" target=\"_blank\" class=\"src-link\">Embecta closes Owen Mumford acquisition for up to $201M</a><span class=\"src-date\">18.05.2026, 15:10</span></div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/spons/is-your-sleep-program-delivering-roi-or-just-tracking-who-remembered-to-cha/820138/\" target=\"_blank\" class=\"src-link\">Is your sleep program delivering ROI or just tracking who remembered to charge their ring?</a><span class=\"src-date\">18.05.2026, 14:00</span></div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/news/natera-wins-fda-approval-for-companion-diagnostic/820450/\" target=\"_blank\" class=\"src-link\">Natera wins FDA approval for companion diagnostic</a><span class=\"src-date\">18.05.2026, 10:45</span></div><div class=\"src-item\"><a href=\"https://www.medtechdive.com/spons/reinventing-the-stethoscope-and-cardiopulmonary-care/819291/\" target=\"_blank\" class=\"src-link\">Reinventing the stethoscope and cardiopulmonary care</a><span class=
